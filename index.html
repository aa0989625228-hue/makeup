<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Beauty Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fcfcfc; font-family: -apple-system, sans-serif; overflow: hidden; }
        .video-container { 
            position: relative; width: 100%; max-width: 480px; aspect-ratio: 3/4; 
            margin: auto; border-radius: 2.5rem; overflow: hidden; 
            background: #000; border: 6px solid #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        /* 重要：使用相同 object-fit 確保影像與畫布完全重合 */
        #webcam, #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; transform: scaleX(-1); 
        }
        .tab-btn { @apply flex-1 py-3 text-sm font-bold text-stone-400 transition-all text-center rounded-full; }
        .tab-btn.active { @apply text-stone-900 bg-white shadow-sm; }
        .color-item { @apply flex flex-col items-center gap-2 cursor-pointer transition-all; }
        .color-ring { @apply w-12 h-12 rounded-full border-[3px] border-white shadow-md; }
        .selected .color-ring { @apply ring-2 ring-stone-800 ring-offset-2; }
        #gate { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4">

    <div id="gate">
        <div class="max-w-md w-full p-8 text-center">
            <h2 class="text-2xl font-black mb-8 text-stone-900">歡迎體驗 AI 試妝</h2>
            <button onclick="bootSystem()" class="w-full bg-[#292524] text-white py-4 rounded-full font-bold shadow-lg">我準備好了</button>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-xs font-bold tracking-[0.4em] text-stone-300 uppercase">Pro V8 Natural</h1>
        </header>

        <div class="video-container mb-8">
            <video id="webcam" playsinline autoplay muted></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-stone-100">
            <div class="flex p-1 bg-stone-100 rounded-full mb-8">
                <button onclick="switchTab('lip', this)" class="tab-btn active">唇部</button>
                <button onclick="switchTab('eye', this)" class="tab-btn">眼部</button>
                <button onclick="switchTab('face', this)" class="tab-btn">底妝</button>
            </div>

            <div id="tab-lip" class="grid grid-cols-4 gap-3 makeup-panel">
                <div onclick="applyMakeup('lip','#B03030',this)" class="color-item">
                    <div class="color-ring" style="background:#B03030"></div>
                    <span class="text-[10px] font-bold text-stone-500">經典紅</span>
                </div>
                <div onclick="applyMakeup('lip','#E18B8B',this)" class="color-item">
                    <div class="color-ring" style="background:#E18B8B"></div>
                    <span class="text-[10px] font-bold text-stone-500">玫瑰粉</span>
                </div>
                <div onclick="applyMakeup('lip','#D946EF',this)" class="color-item">
                    <div class="color-ring" style="background:#D946EF"></div>
                    <span class="text-[10px] font-bold text-stone-500">芭比粉</span>
                </div>
            </div>

            <div id="tab-eye" class="hidden grid grid-cols-4 gap-3 makeup-panel">
                <div onclick="applyMakeup('eye','#654321',this)" class="color-item">
                    <div class="color-ring" style="background:#654321"></div>
                    <span class="text-[10px] font-bold text-stone-500">大地棕</span>
                </div>
                <div onclick="applyMakeup('eye','#F472B6',this)" class="color-item">
                    <div class="color-ring" style="background:#F472B6"></div>
                    <span class="text-[10px] font-bold text-stone-500">甜心粉</span>
                </div>
                <div onclick="applyMakeup('eye','#D4AF37',this)" class="color-item">
                    <div class="color-ring" style="background:#D4AF37"></div>
                    <span class="text-[10px] font-bold text-stone-500">香檳金</span>
                </div>
            </div>

            <div id="tab-face" class="hidden grid grid-cols-4 gap-3 makeup-panel">
                <div onclick="applyMakeup('face','#F3E0D0',this)" class="color-item">
                    <div class="color-ring" style="background:#F3E0D0"></div>
                    <span class="text-[10px] font-bold text-stone-500">象牙色</span>
                </div>
                <div onclick="applyMakeup('face','#E8D0BB',this)" class="color-item">
                    <div class="color-ring" style="background:#E8D0BB"></div>
                    <span class="text-[10px] font-bold text-stone-500">自然色</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        let currentMakeup = { lip: null, eye: null, face: null };
        let faceMesh;

        async function bootSystem() {
            document.getElementById('gate').style.display = 'none';
            faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
            faceMesh.onResults(onResults);

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                // 強制讓畫布解析度與鏡頭硬體一致，徹底解決偏移問題
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                video.play();
                requestAnimationFrame(process);
            };
        }

        async function process() {
            await faceMesh.send({image: video});
            requestAnimationFrame(process);
        }

        function onResults(results) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
                const pts = results.multiFaceLandmarks[0];

                // 畫底妝 (柔和疊加)
                if (currentMakeup.face) {
                    ctx.save();
                    ctx.beginPath();
                    const faceContour = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];
                    faceContour.forEach((id, i) => {
                        const p = pts[id];
                        i === 0 ? ctx.moveTo(p.x * canvas.width, p.y * canvas.height) : ctx.lineTo(p.x * canvas.width, p.y * canvas.height);
                    });
                    ctx.fillStyle = currentMakeup.face;
                    ctx.globalAlpha = 0.2;
                    ctx.globalCompositeOperation = "soft-light";
                    ctx.filter = "blur(12px)";
                    ctx.fill();
                    ctx.restore();
                }

                // 畫唇彩
                if (currentMakeup.lip) drawPart(pts, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291], currentMakeup.lip, 0.5, "multiply", 1);
                
                // 畫眼影
                if (currentMakeup.eye) {
                    drawPart(pts, [223, 224, 225, 226, 230, 231, 232], currentMakeup.eye, 0.2, "multiply", 10);
                    drawPart(pts, [443, 444, 445, 446, 450, 451, 452], currentMakeup.eye, 0.2, "multiply", 10);
                }
            }
        }

        function drawPart(pts, idxs, color, alpha, blendMode, blurVal) {
            ctx.save(); ctx.beginPath(); ctx.fillStyle = color; ctx.globalAlpha = alpha; ctx.globalCompositeOperation = blendMode; ctx.filter = `blur(${blurVal}px)`;
            idxs.forEach((id, i) => {
                const p = pts[id];
                i === 0 ? ctx.moveTo(p.x * canvas.width, p.y * canvas.height) : ctx.lineTo(p.x * canvas.width, p.y * canvas.height);
            });
            ctx.fill(); ctx.restore();
        }

        window.switchTab = (tabId, btn) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.makeup-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
        };

        window.applyMakeup = (part, color, el) => {
            currentMakeup[part] = color;
            el.parentNode.querySelectorAll('.color-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        };
    </script>
</body>
</html>
