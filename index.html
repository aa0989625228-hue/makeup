<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heme AI 智慧五官試妝系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto+Sans+TC', sans-serif; }
        .camera-box { background: #000; border-radius: 30px; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
        .active-cate { @apply bg-stone-800 text-white shadow-lg; }
        .product-item { @apply border border-stone-100 p-3 rounded-2xl text-center cursor-pointer bg-white hover:bg-stone-50 transition-all duration-300 shadow-sm; }
        .active-prod { @apply border-stone-800 ring-2 ring-stone-100 bg-stone-50; }
        .recommend-tag { @apply absolute -top-2 -right-1 bg-amber-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold animate-pulse shadow-md; }
    </style>
</head>
<body class="bg-[#fcfaf8] min-h-screen text-stone-800">

    <div id="step-start" class="flex items-center justify-center min-h-screen p-4 bg-gray-50">
        <div class="bg-white p-12 rounded-[2.5rem] shadow-2xl text-center max-w-md w-full border border-stone-100">
            <h1 class="text-3xl font-bold tracking-[0.2em] mb-2 text-stone-800">探索妳的專屬本色</h1>
            <p class="text-stone-400 text-xs mb-10 tracking-[0.3em] uppercase font-light">AI Digital Beauty Analysis</p>
            
            <div class="mb-8 px-4">
                <div class="w-full bg-stone-100 h-1 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-stone-800 h-full w-0 transition-all duration-700"></div>
                </div>
                <p id="loader-text" class="text-[10px] text-stone-400 mt-3 italic tracking-widest">系統大數據模型初始化中...</p>
            </div>

            <button id="main-start-btn" onclick="startExperience()" disabled class="w-full bg-stone-300 text-white py-4 rounded-full font-bold transition-all duration-500 shadow-xl cursor-not-allowed">
                立即體驗 Try It On
            </button>
        </div>
    </div>

    <div id="step-main" class="hidden max-w-7xl mx-auto p-6 lg:p-12">
        <header class="text-center mb-10">
            <h2 class="text-2xl font-bold tracking-widest text-stone-800">heme AI 智慧五官試妝</h2>
            <p class="text-[10px] text-stone-400 uppercase tracking-[0.4em] mt-1">Face Tracking & AI Recommendation</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-stone-50">
                    <div id="api-panel" class="mb-8 p-5 bg-stone-50 rounded-2xl border-l-4 border-stone-800">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[9px] font-bold text-stone-400 uppercase tracking-tighter">Backend API Response</span>
                            <span class="flex h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse"></span>
                        </div>
                        <p id="recom-text" class="text-xs font-bold text-stone-700 leading-relaxed italic">分析面部特徵中...</p>
                    </div>

                    <h3 class="text-[11px] font-bold text-stone-300 uppercase tracking-widest mb-4">Step 1. 選擇類別 Category</h3>
                    <div class="grid grid-cols-3 gap-2 mb-10">
                        <button id="btn-底妝" onclick="selectCate('底妝')" class="py-3 text-xs border rounded-xl transition-all">底妝</button>
                        <button id="btn-眼妝" onclick="selectCate('眼妝')" class="py-3 text-xs border rounded-xl transition-all">眼妝</button>
                        <button id="btn-唇妝" onclick="selectCate('唇妝')" class="py-3 text-xs border rounded-xl transition-all">唇妝</button>
                    </div>

                    <h3 class="text-[11px] font-bold text-stone-300 uppercase tracking-widest mb-4">Step 2. 選擇色號 Shades</h3>
                    <div id="product-grid" class="grid grid-cols-3 gap-3"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="camera-box aspect-[4/3]">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="output_canvas"></canvas>
                    <div id="camera-loading" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-20">
                        <div class="w-10 h-10 border-2 border-stone-100 border-t-stone-800 rounded-full animate-spin mb-4"></div>
                        <p class="text-xs text-stone-400 tracking-[0.2em]">正在建立加密視覺串流...</p>
                    </div>
                </div>
                <div class="mt-8 flex justify-between items-center">
                    <button onclick="location.reload()" class="text-stone-300 text-xs hover:text-stone-800 underline underline-offset-4">重置系統 Reset</button>
                    <button onclick="showComparison()" class="bg-stone-800 text-white px-12 py-4 rounded-2xl font-bold text-sm shadow-2xl hover:-translate-y-1 transition-all">查看試妝對比</button>
                </div>
            </div>
        </div>
    </div>

    <div id="step-compare" class="hidden fixed inset-0 bg-white z-50 p-6 flex flex-col items-center overflow-y-auto">
        <h2 class="text-2xl font-bold mb-10 tracking-[0.4em] text-stone-800 mt-10">BEFORE & AFTER</h2>
        <div class="grid md:grid-cols-2 gap-8 w-full max-w-6xl mb-12">
            <div class="text-center">
                <p class="text-[10px] text-stone-400 uppercase mb-3 font-bold">原始膚色 Original</p>
                <canvas id="c-before" class="w-full rounded-[2rem] shadow-xl border border-stone-100" width="640" height="480"></canvas>
            </div>
            <div class="text-center">
                <p class="text-[10px] text-stone-800 uppercase mb-3 font-bold">AI 試妝效果 Applied</p>
                <canvas id="c-after" class="w-full rounded-[2rem] shadow-xl border border-stone-100" width="640" height="480"></canvas>
            </div>
        </div>
        <button onclick="document.getElementById('step-compare').classList.add('hidden')" class="bg-stone-100 text-stone-600 px-16 py-4 rounded-full font-bold hover:bg-stone-200 transition-all mb-10">返回調整</button>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0";

        let faceLandmarker;
        let video = document.getElementById("webcam");
        let canvasElement = document.getElementById("output_canvas");
        let canvasCtx = canvasElement.getContext("2d");
        let activeMakeup = { mode: '', color: 'rgba(0,0,0,0)', mix: 'multiply' };
        let currentSkinMatch = 'medium';

        // 產品大數據資料庫
        const products = {
            '底妝': [
                { name: '01 柔白', color: 'rgba(252, 243, 232, 0.3)', mix: 'soft-light', match: 'fair' },
                { name: '02 自然', color: 'rgba(245, 225, 204, 0.3)', mix: 'soft-light', match: 'medium' }
            ],
            '眼妝': [
                { name: '焦糖拿鐵', color: 'rgba(139, 69, 19, 0.4)', mix: 'multiply', match: 'medium' },
                { name: '乾燥玫瑰', color: 'rgba(188, 143, 143, 0.4)', mix: 'multiply', match: 'fair' }
            ],
            '唇妝': [
                { name: '經典紅', color: 'rgba(153, 27, 27, 0.5)', mix: 'soft-light', match: 'medium' },
                { name: '豆沙粉', color: 'rgba(157, 91, 91, 0.6)', mix: 'multiply', match: 'fair' }
            ]
        };

        // --- 核心優化：網頁開啟後自動預載 AI ---
        async function preloadAI() {
            const progress = document.getElementById('progress-bar');
            const text = document.getElementById('loader-text');
            const btn = document.getElementById('main-start-btn');

            try {
                updateUI(20, "正在連線數據伺服器...");
                const filesetResolver = await FilesetResolver.forTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
                
                updateUI(50, "下載 AI 深度學習模型 (約 15MB)...");
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { 
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO", numFaces: 1
                });

                updateUI(100, "系統就緒 Ready");
                btn.disabled = false;
                btn.classList.replace('bg-stone-300', 'bg-stone-800');
                btn.classList.remove('cursor-not-allowed');
            } catch (e) {
                text.innerText = "Error: 請確認是否為 HTTPS 連線";
                console.error(e);
            }
        }

        function updateUI(val, msg) {
            document.getElementById('progress-bar').style.width = val + '%';
            document.getElementById('loader-text').innerText = msg;
        }

        preloadAI(); // 啟動背景預載

        window.startExperience = async () => {
            document.getElementById('step-start').classList.add('hidden');
            document.getElementById('step-main').classList.remove('hidden');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadeddata = () => {
                    document.getElementById('camera-loading').style.display = 'none';
                    canvasElement.width = video.videoWidth;
                    canvasElement.height = video.videoHeight;
                    requestAnimationFrame(predictLoop);
                    window.selectCate('底妝');
                };
            } catch (err) {
                alert("無法存取鏡頭，請確認權限。");
            }
        };

        // 模擬 API 數據交換邏輯
        async function callBackendAPI(faceData) {
            // 模擬傳輸延遲與大數據判斷
            const skinType = faceData < -0.045 ? 'fair' : 'medium';
            const panel = document.getElementById('api-panel');
            panel.classList.replace('bg-stone-50', 'bg-amber-50');
            
            document.getElementById('recom-text').innerHTML = skinType === 'fair' 
                ? "API 回傳：<span class='text-amber-700'>檢測到明亮色溫。推薦選用粉嫩系產品。</span>" 
                : "API 回傳：<span class='text-amber-700'>檢測到溫潤色溫。推薦選用大地系產品。</span>";
            
            return skinType;
        }

        async function predictLoop() {
            const results = faceLandmarker.detectForVideo(video, performance.now());
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                const pts = results.faceLandmarks[0];
                
                // 模擬資管 API 數據請求 (約每 3 秒觸發一次)
                if (Math.random() > 0.99) {
                    currentSkinMatch = await callBackendAPI(pts[10].z);
                    const currentCat = document.querySelector('.active-cate')?.innerText;
                    if(currentCat) window.selectCate(currentCat);
                }

                // AI 渲染
                if (activeMakeup.mode === '眼妝') {
                    renderMakeup(canvasCtx, pts, [33, 160, 158, 133, 153, 144], activeMakeup.color); // 左眼
                    renderMakeup(canvasCtx, pts, [362, 385, 387, 263, 373, 380], activeMakeup.color); // 右眼
                } else if (activeMakeup.mode === '唇妝') {
                    renderMakeup(canvasCtx, pts, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291], activeMakeup.color);
                }
            }
            requestAnimationFrame(predictLoop);
        }

        function renderMakeup(ctx, pts, idxs, color) {
            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.globalCompositeOperation = activeMakeup.mix;
            idxs.forEach((id, i) => {
                const x = pts[id].x * canvasElement.width;
                const y = pts[id].y * canvasElement.height;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.fill();
        }

        window.selectCate = (cat) => {
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('active-cate'));
            document.getElementById(`btn-${cat}`).classList.add('active-cate');
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            products[cat].forEach(p => {
                const div = document.createElement('div');
                const isMatch = p.match === currentSkinMatch;
                div.className = `product-item relative ${isMatch ? 'border-amber-400' : ''}`;
                div.innerHTML = `
                    ${isMatch ? '<div class="recommend-tag">AI 推薦</div>' : ''}
                    <div class="w-full h-10 rounded-xl mb-2 shadow-inner" style="background:${p.color}"></div>
                    <div class="text-[10px] font-bold text-stone-600">${p.name}</div>
                `;
                div.onclick = () => {
                    activeMakeup = { mode: cat, ...p };
                    document.querySelectorAll('.product-item').forEach(i => i.classList.remove('active-prod'));
                    div.classList.add('active-prod');
                    if(cat==='底妝') video.style.filter = 'scaleX(-1) brightness(1.08) contrast(0.98)';
                    else video.style.filter = 'scaleX(-1)';
                };
                grid.appendChild(div);
            });
        };

        window.showComparison = () => {
            document.getElementById('step-compare').classList.remove('hidden');
            const b = document.getElementById('c-before').getContext('2d');
            const a = document.getElementById('c-after').getContext('2d');
            b.save(); b.scale(-1, 1); b.drawImage(video, -640, 0, 640, 480); b.restore();
            a.save(); a.scale(-1, 1); a.drawImage(video, -640, 0, 640, 480); a.restore();
        };
    </script>
</body>
</html>
