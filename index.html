<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEME AI 全能試妝系統</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container { position: relative; width: 100%; max-width: 640px; margin: auto; border-radius: 24px; overflow: hidden; background: #000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); }
        #webcam { width: 100%; height: auto; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .color-dot { @apply w-6 h-6 rounded-full border border-stone-200 cursor-pointer transition hover:scale-125; }
        .tab-btn { @apply px-4 py-2 text-[11px] border rounded-full transition-all; }
        .active-tab { @apply bg-stone-800 text-white border-stone-800; }
        .active-dot { @apply ring-2 ring-stone-800 ring-offset-2; }
    </style>
</head>
<body class="bg-[#fcfaf8] p-4 lg:p-8 text-stone-800">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-xl font-bold tracking-[0.3em] uppercase">Heme Pro Virtual</h1>
        </header>

        <div class="grid lg:grid-cols-12 gap-8 items-start">
            <div class="lg:col-span-7">
                <div class="video-container">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>
                    <div id="status" class="absolute inset-0 flex items-center justify-center bg-white z-50">
                        <p class="text-[10px] tracking-widest animate-pulse">精準定位引擎啟動中...</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-stone-100">
                    <div class="flex gap-2 mb-6 border-b border-stone-50 pb-4">
                        <button onclick="switchTab('lip', this)" class="tab-btn active-tab">唇彩</button>
                        <button onclick="switchTab('eye', this)" class="tab-btn">眼影</button>
                        <button onclick="switchTab('face', this)" class="tab-btn">底妝</button>
                    </div>

                    <div id="color-selector" class="grid grid-cols-5 gap-4">
                        </div>

                    <div class="mt-8 pt-4 border-t border-stone-50">
                        <button onclick="resetAll()" class="text-[10px] text-stone-300 underline uppercase tracking-widest">清除所有妝效</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        
        let currentMakeup = {
            lip: { color: null, opacity: 0.5 },
            eye: { color: null, opacity: 0.3 },
            face: { color: null, opacity: 0.2 }
        };

        const palette = {
            lip: ['#991b1b', '#b91c1c', '#dc2626', '#9d5b5b', '#be185d'],
            eye: ['#78350f', '#92400e', '#d97706', '#8b5e3c', '#c084fc'],
            face: ['#fef3c7', '#fde68a', '#fcd34d', '#fde047', '#fbbf24']
        };

        async function init() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights/';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, frameRate: { ideal: 60 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                status.remove();
                faceapi.matchDimensions(canvas, video);
                switchTab('lip', document.querySelector('.tab-btn'));
                track();
            };
        }

        async function track() {
            // 使用 TinyFaceDetector 配合極低的輸入尺寸來換取極致速度
            const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 128, scoreThreshold: 0.5 });
            const result = await faceapi.detectSingleFace(video, options).withFaceLandmarks();

            if (result) {
                const ctx = canvas.getContext('2d');
                const dims = faceapi.matchDimensions(canvas, video, true);
                const resized = faceapi.resizeResults(result, dims);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const landmarks = resized.landmarks;

                // 渲染底妝 (全臉氣墊效果)
                if (currentMakeup.face.color) {
                    drawArea(ctx, landmarks.getJawOutline(), currentMakeup.face.color, currentMakeup.face.opacity);
                }
                
                // 渲染眼妝
                if (currentMakeup.eye.color) {
                    drawArea(ctx, landmarks.getLeftEye(), currentMakeup.eye.color, currentMakeup.eye.opacity);
                    drawArea(ctx, landmarks.getRightEye(), currentMakeup.eye.color, currentMakeup.eye.opacity);
                }

                // 渲染唇妝 (黏著度最高處理)
                if (currentMakeup.lip.color) {
                    drawArea(ctx, landmarks.getMouth(), currentMakeup.lip.color, currentMakeup.lip.opacity);
                }
            }
            // 使用 requestAnimationFrame 確保同步瀏覽器更新頻率
            requestAnimationFrame(track);
        }

        function drawArea(ctx, points, color, opacity) {
            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.globalAlpha = opacity;
            ctx.globalCompositeOperation = "multiply";
            points.forEach((p, i) => {
                i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.fill();
        }

        window.switchTab = (type, el) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            el.classList.add('active-tab');
            
            const container = document.getElementById('color-selector');
            container.innerHTML = palette[type].map(c => `
                <div onclick="setMakeup('${type}', '${c}', this)" 
                     class="color-dot ${currentMakeup[type].color === c ? 'active-dot' : ''}" 
                     style="background: ${c}"></div>
            `).join('');
        };

        window.setMakeup = (type, color, el) => {
            currentMakeup[type].color = color;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active-dot'));
            el.classList.add('active-dot');
        };

        window.resetAll = () => {
            Object.keys(currentMakeup).forEach(k => currentMakeup[k].color = null);
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active-dot'));
        };

        init();
    </script>
</body>
</html>
