<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heme AI 專業試妝系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --heme-stone: #a8a29e; }
        .camera-box { background: #000; border-radius: 20px; position: relative; overflow: hidden; border: 2px solid #e7e5e4; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
        .active-cate { @apply bg-stone-800 text-white shadow-lg; }
        .product-item { @apply border border-stone-200 p-2 rounded-lg text-center cursor-pointer bg-white transition shadow-sm; }
        .active-prod { @apply border-stone-800 ring-2 ring-stone-100 bg-stone-50; }
        .recommend-tag { @apply absolute -top-2 -right-1 bg-amber-500 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold; }
    </style>
</head>
<body class="bg-[#fcfaf8] min-h-screen text-stone-800">

    <div id="step-start" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-12 rounded-3xl shadow-xl text-center max-w-sm w-full border border-stone-100">
            <h1 class="text-2xl font-bold tracking-widest mb-2">虛擬試妝體驗</h1>
            <p class="text-stone-400 text-xs mb-8 tracking-widest uppercase font-light">Virtual Makeup Experience</p>
            <button onclick="requestCamera()" class="w-full bg-stone-800 text-white py-4 rounded-full font-bold hover:scale-105 transition shadow-lg">立即體驗 Try It On</button>
        </div>
    </div>

    <div id="step-main" class="hidden max-w-6xl mx-auto p-4 lg:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-100">
                    <div id="ai-recom-box" class="mb-6 p-4 bg-amber-50 rounded-xl border-l-4 border-amber-400">
                        <p id="recom-text" class="text-xs font-bold text-amber-800 leading-relaxed">正在掃描五官特徵...</p>
                    </div>

                    <h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-3">1. 選擇類別</h3>
                    <div class="grid grid-cols-3 gap-2 mb-6">
                        <button id="btn-底妝" onclick="selectCate('底妝')" class="py-2.5 text-xs border rounded-xl transition">底妝</button>
                        <button id="btn-眼妝" onclick="selectCate('眼妝')" class="py-2.5 text-xs border rounded-xl transition">眼妝</button>
                        <button id="btn-唇妝" onclick="selectCate('唇妝')" class="py-2.5 text-xs border rounded-xl transition">唇妝</button>
                    </div>

                    <h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-3">2. 選擇色號</h3>
                    <div id="product-grid" class="grid grid-cols-3 gap-3"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="camera-box aspect-[4/3]">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="output_canvas"></canvas>
                    <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-20">
                        <div class="w-8 h-8 border-4 border-stone-200 border-t-stone-800 rounded-full animate-spin mb-2"></div>
                        <span class="text-xs text-stone-400">AI 五官追蹤啟動中...</span>
                    </div>
                </div>
                <div class="mt-4 flex justify-between">
                    <button onclick="location.reload()" class="text-xs text-stone-400 underline">重置</button>
                    <button onclick="goToCompare()" class="bg-stone-800 text-white px-8 py-2 rounded-lg text-sm font-bold">查看對比</button>
                </div>
            </div>
        </div>
    </div>

    <div id="step-compare" class="hidden fixed inset-0 bg-white z-50 p-6 overflow-y-auto">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="text-xl font-bold mb-8 tracking-widest">試妝成果對比</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <canvas id="c-before" class="w-full rounded-xl shadow-lg" width="640" height="480"></canvas>
                <canvas id="c-after" class="w-full rounded-xl shadow-lg" width="640" height="480"></canvas>
            </div>
            <button onclick="location.reload()" class="bg-stone-800 text-white px-12 py-3 rounded-full">返回體驗</button>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0";

        let faceLandmarker;
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        let activeMakeup = { mode: '', color: 'rgba(0,0,0,0)', mix: 'multiply' };

        const products = {
            '底妝': [
                { name: '01 柔白', color: 'rgba(252, 243, 232, 0.3)', mix: 'soft-light', rec: 'fair' },
                { name: '02 自然', color: 'rgba(245, 225, 204, 0.3)', mix: 'soft-light', rec: 'medium' }
            ],
            '眼妝': [
                { name: '焦糖', color: 'rgba(139, 69, 19, 0.4)', mix: 'multiply', rec: 'medium' },
                { name: '玫瑰', color: 'rgba(188, 143, 143, 0.4)', mix: 'multiply', rec: 'fair' }
            ],
            '唇妝': [
                { name: '經典紅', color: 'rgba(153, 27, 27, 0.5)', mix: 'soft-light', rec: 'medium' },
                { name: '豆沙', color: 'rgba(157, 91, 91, 0.6)', mix: 'multiply', rec: 'fair' }
            ]
        };

        async function initAI() {
            const filesetResolver = await FilesetResolver.forTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });
        }

        window.requestCamera = async () => {
            document.getElementById('step-start').classList.add('hidden');
            document.getElementById('step-main').classList.remove('hidden');
            await initAI();
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadeddata = () => {
                document.getElementById('loading').style.display = 'none';
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
                predictLoop();
                window.selectCate('底妝');
            };
        };

        function predictLoop() {
            const results = faceLandmarker.detectForVideo(video, performance.now());
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                const pts = results.faceLandmarks[0];
                const skin = pts[10].z < -0.04 ? 'fair' : 'medium';
                document.getElementById('recom-text').innerText = skin === 'fair' ? "✨ AI 建議：膚色白皙，適合粉嫩色系展現氣色。" : "🌿 AI 建議：膚色健康，適合大地色系深邃五官。";

                if (activeMakeup.mode === '眼妝') {
                    drawPath(canvasCtx, pts, [33, 160, 158, 133, 153, 144], activeMakeup.color);
                    drawPath(canvasCtx, pts, [362, 385, 387, 263, 373, 380], activeMakeup.color);
                } else if (activeMakeup.mode === '唇妝') {
                    drawPath(canvasCtx, pts, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291], activeMakeup.color);
                }
            }
            requestAnimationFrame(predictLoop);
        }

        function drawPath(ctx, pts, indices, color) {
            ctx.beginPath(); ctx.fillStyle = color; ctx.globalCompositeOperation = activeMakeup.mix;
            indices.forEach((idx, i) => {
                const x = pts[idx].x * canvasElement.width;
                const y = pts[idx].y * canvasElement.height;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.fill();
        }

        window.selectCate = (cat) => {
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('active-cate'));
            document.getElementById(`btn-${cat}`).classList.add('active-cate');
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products[cat].forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-item relative';
                div.innerHTML = `<div class="w-full h-8 rounded mb-1" style="background:${p.color}"></div><div class="text-[10px]">${p.name}</div>`;
                div.onclick = () => {
                    activeMakeup = { mode: cat, ...p };
                    document.querySelectorAll('.product-item').forEach(i => i.classList.remove('active-prod'));
                    div.classList.add('active-prod');
                    if(cat==='底妝') video.style.filter = 'scaleX(-1) brightness(1.05)'; else video.style.filter = 'scaleX(-1)';
                };
                grid.appendChild(div);
            });
        };

        window.goToCompare = () => {
            document.getElementById('step-compare').classList.remove('hidden');
            const bCtx = document.getElementById('c-before').getContext('2d');
            const aCtx = document.getElementById('c-after').getContext('2d');
            bCtx.save(); bCtx.scale(-1, 1); bCtx.drawImage(video, -640, 0, 640, 480); bCtx.restore();
            aCtx.save(); aCtx.scale(-1, 1); aCtx.drawImage(video, -640, 0, 640, 480); aCtx.restore();
        };
    </script>
</body>
</html>
