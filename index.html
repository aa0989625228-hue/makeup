<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>HEME Pro - MediaPipe 468 Mesh</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container { position: relative; width: 640px; height: 480px; margin: auto; border-radius: 2rem; overflow: hidden; border: 8px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.1); background: #000; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .color-dot { width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; cursor: pointer; transition: 0.3s; }
        .active-dot { border-color: #000 !important; transform: scale(1.1); }
        .makeup-pane { display: none; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .active-pane { display: grid !important; }
    </style>
</head>
<body class="bg-[#fcfaf8] p-10 text-stone-800">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-2xl font-black tracking-[0.3em] uppercase">Heme AI Mesh V6</h1>
            <p class="text-xs text-stone-400 mt-2">使用 MediaPipe 468 點 3D 臉部網格技術</p>
        </header>

        <div class="grid lg:grid-cols-12 gap-10">
            <div class="lg:col-span-7">
                <div class="video-container">
                    <video id="webcam"></video>
                    <canvas id="overlay"></canvas>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-stone-50 min-h-[500px]">
                    <div class="flex gap-4 mb-10 justify-center">
                        <button onclick="switchTab('lip', this)" class="px-6 py-2 rounded-full text-xs font-bold bg-black text-white tab-btn">唇彩</button>
                        <button onclick="switchTab('eye', this)" class="px-6 py-2 rounded-full text-xs font-bold text-stone-400 border tab-btn">眼影</button>
                        <button onclick="switchTab('face', this)" class="px-6 py-2 rounded-full text-xs font-bold text-stone-400 border tab-btn">底妝</button>
                    </div>

                    <div id="pane-lip" class="makeup-pane active-pane">
                        <div class="flex flex-col items-center"><div onclick="apply('lip','#991b1b')" class="color-dot" style="background:#991b1b"></div><span class="text-[10px] mt-2">經典紅</span></div>
                        <div class="flex flex-col items-center"><div onclick="apply('lip','#bc8f8f')" class="color-dot" style="background:#bc8f8f"></div><span class="text-[10px] mt-2">肉桂粉</span></div>
                    </div>

                    <div id="pane-eye" class="makeup-pane">
                        <div class="flex flex-col items-center"><div onclick="apply('eye','#451a03')" class="color-dot" style="background:#451a03"></div><span class="text-[10px] mt-2">大地棕</span></div>
                        <div class="flex flex-col items-center"><div onclick="apply('eye','#fecdd3')" class="color-dot" style="background:#fecdd3"></div><span class="text-[10px] mt-2">玫瑰金</span></div>
                    </div>

                    <div id="pane-face" class="makeup-pane">
                        <div class="flex flex-col items-center"><div onclick="apply('face','#fef3c7')" class="color-dot" style="background:#fef3c7"></div><span class="text-[10px] mt-2">象牙白</span></div>
                        <div class="flex flex-col items-center"><div onclick="apply('face','#fde68a')" class="color-dot" style="background:#fde68a"></div><span class="text-[10px] mt-2">自然色</span></div>
                    </div>

                    <button onclick="location.reload()" class="mt-20 text-[10px] text-stone-300 underline">重置系統</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('overlay');
        const canvasCtx = canvasElement.getContext('2d');

        let makeup = { lip: null, eye: null, face: null };

        // 1. 初始化 Face Mesh
        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true, // 💡 開啟此項可獲得極高精度的眼球與嘴唇邊緣
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onResults);

        // 2. 相機啟動
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();

        function onResults(results) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks) {
                for (const landmarks of results.multiFaceLandmarks) {
                    
                    // 💡 A. 底妝渲染：使用 468 點全臉網格 (徹底解決面具感)
                    if (makeup.face) {
                        drawFaceFoundation(canvasCtx, landmarks, makeup.face);
                    }

                    // 💡 B. 眼妝渲染：精確定位眼瞼 (468 點的高精度)
                    if (makeup.eye) {
                        drawEyeShadow(canvasCtx, landmarks, makeup.eye);
                    }

                    // 💡 C. 唇部渲染
                    if (makeup.lip) {
                        drawLips(canvasCtx, landmarks, makeup.lip);
                    }
                }
            }
            canvasCtx.restore();
        }

        // --- 核心渲染函數 ---

        function drawFaceFoundation(ctx, points, color) {
            ctx.globalCompositeOperation = "overlay"; // 💡 讓膚質透出來的關鍵
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.2;
            ctx.filter = "blur(15px)"; // 💡 邊緣羽化，消滅三角形
            
            ctx.beginPath();
            // 使用 MediaPipe 的臉部邊界索引 (由 10, 338, 297... 等點組成)
            const faceOutlineIndices = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];
            faceOutlineIndices.forEach((idx, i) => {
                const p = points[idx];
                if (i === 0) ctx.moveTo(p.x * canvasElement.width, p.y * canvasElement.height);
                else ctx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height);
            });
            ctx.fill();
        }

        function drawEyeShadow(ctx, points, color) {
            ctx.globalCompositeOperation = "multiply";
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.3;
            ctx.filter = "blur(8px)";
            
            // 左眼窩索引
            const leftEyeIndices = [223, 224, 225, 226, 230, 231, 232, 233];
            ctx.beginPath();
            leftEyeIndices.forEach((idx, i) => {
                const p = points[idx];
                if (i === 0) ctx.moveTo(p.x * canvasElement.width, p.y * canvasElement.height);
                else ctx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height);
            });
            ctx.fill();

            // 右眼窩索引
            const rightEyeIndices = [443, 444, 445, 446, 450, 451, 452, 453];
            ctx.beginPath();
            rightEyeIndices.forEach((idx, i) => {
                const p = points[idx];
                if (i === 0) ctx.moveTo(p.x * canvasElement.width, p.y * canvasElement.height);
                else ctx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height);
            });
            ctx.fill();
        }

        function drawLips(ctx, points, color) {
            ctx.globalCompositeOperation = "multiply";
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.4;
            ctx.filter = "blur(2px)";
            
            // 嘴唇外輪廓索引
            const lipIndices = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291];
            ctx.beginPath();
            lipIndices.forEach((idx, i) => {
                const p = points[idx];
                if (i === 0) ctx.moveTo(p.x * canvasElement.width, p.y * canvasElement.height);
                else ctx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height);
            });
            ctx.fill();
        }

        // --- UI Logic ---
        window.switchTab = (t, btn) => {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.className = "px-6 py-2 rounded-full text-xs font-bold text-stone-400 border tab-btn";
            });
            btn.className = "px-6 py-2 rounded-full text-xs font-bold bg-black text-white tab-btn";
            document.querySelectorAll('.makeup-pane').forEach(p => p.classList.remove('active-pane'));
            document.getElementById(`pane-${t}`).classList.add('active-pane');
        }

        window.apply = (type, color) => {
            makeup[type] = color;
        }
    </script>
</body>
</html>
