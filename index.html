<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heme AI 智慧試妝</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container { position: relative; width: 100%; max-width: 640px; margin: auto; border-radius: 20px; overflow: hidden; background: #000; }
        #webcam { width: 100%; height: auto; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .product-btn { @apply border border-stone-200 p-3 rounded-2xl bg-white transition-all hover:border-stone-800 active:scale-95; }
        .active-prod { @apply border-stone-800 ring-2 ring-stone-100 bg-stone-50; }
    </style>
</head>
<body class="bg-[#fcfaf8] p-4 lg:p-10">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-center text-xl font-bold tracking-widest text-stone-800 mb-8 uppercase">Heme Precision AI</h1>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8">
                <div class="video-container shadow-2xl">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>
                    <div id="status" class="absolute inset-0 flex items-center justify-center bg-white text-xs tracking-tighter">
                        <span class="animate-pulse">系統初始化中 (HEME AI ENGINE)...</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm">
                    <h3 class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-4">選取唇色</h3>
                    <div class="grid grid-cols-2 gap-3" id="lipstick-grid">
                        <button onclick="applyLipstick('#991b1b', 0.5, this)" class="product-btn">
                            <div class="w-full h-8 rounded-lg mb-2" style="background: #991b1b;"></div>
                            <span class="text-[10px] font-bold text-stone-600">經典紅</span>
                        </button>
                        <button onclick="applyLipstick('#9d5b5b', 0.6, this)" class="product-btn">
                            <div class="w-full h-8 rounded-lg mb-2" style="background: #9d5b5b;"></div>
                            <span class="text-[10px] font-bold text-stone-600">豆沙粉</span>
                        </button>
                    </div>
                    <button onclick="clearLipstick()" class="w-full mt-4 py-2 text-[10px] text-stone-300 underline uppercase tracking-widest">重置效果</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        let currentLipColor = null;
        let currentOpacity = 0.5;

        // 1. 強制從穩定節點載入極小模型 (防止卡 0%)
        async function loadModels() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights/';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
                ]);
                startVideo();
            } catch (e) {
                status.innerText = "模型載入失敗，請檢查 GitHub 連線";
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        status.style.opacity = '0';
                        setTimeout(() => status.remove(), 500);
                        onPlay();
                    };
                });
        }

        async function onPlay() {
            if (video.paused || video.ended) return setTimeout(() => onPlay());

            // 使用 TinyFaceDetector (極速版)，專門解決手機跑不動的問題
            const result = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();

            if (result) {
                const dims = faceapi.matchDimensions(canvas, video, true);
                const resizedResult = faceapi.resizeResults(result, dims);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (currentLipColor) {
                    const mouth = resizedResult.landmarks.getMouth();
                    ctx.beginPath();
                    ctx.fillStyle = currentLipColor;
                    ctx.globalAlpha = currentOpacity;
                    ctx.globalCompositeOperation = "multiply"; // 自然融合紋理
                    
                    mouth.forEach((pt, i) => {
                        if (i === 0) ctx.moveTo(pt.x, pt.y);
                        else ctx.lineTo(pt.x, pt.y);
                    });
                    ctx.closePath();
                    ctx.fill();
                }
            }
            requestAnimationFrame(() => onPlay());
        }

        window.applyLipstick = (color, opacity, el) => {
            currentLipColor = color;
            currentOpacity = opacity;
            document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('active-prod'));
            el.classList.add('active-prod');
        };

        window.clearLipstick = () => {
            currentLipColor = null;
            document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('active-prod'));
        };

        loadModels();
    </script>
</body>
</html>
