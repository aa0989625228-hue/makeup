<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heme AI 專業五官偵測系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .camera-box { background: #000; border-radius: 24px; position: relative; overflow: hidden; border: 4px solid #f5f5f4; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .active-cate { @apply bg-stone-800 text-white shadow-lg scale-105; }
        .recommend-tag { @apply absolute top-2 right-2 bg-amber-500 text-white text-[10px] px-2 py-1 rounded-full font-bold animate-bounce; }
    </style>
</head>
<body class="bg-[#fcfaf8] min-h-screen text-stone-800">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 p-4 border-b border-stone-100 text-center">
        <h1 class="text-xl font-bold tracking-[0.2em]">heme AI 智慧五官試妝</h1>
        <p class="text-[10px] text-stone-400 uppercase tracking-widest">Face Tracking & AI Recommendation</p>
    </nav>

    <main class="max-w-6xl mx-auto p-4 lg:p-8">
        <div id="step-main" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-100">
                    <div id="ai-recom-box" class="mb-6 p-4 bg-stone-50 rounded-xl border-l-4 border-amber-400 hidden">
                        <h4 class="text-xs font-bold text-stone-400 uppercase mb-1">AI Smart Recommendation</h4>
                        <p id="recom-text" class="text-sm font-bold text-stone-700">偵測中...</p>
                    </div>

                    <h3 class="text-xs font-bold mb-4 tracking-widest text-stone-400 uppercase">Step 1. 類別 Category</h3>
                    <div class="grid grid-cols-3 gap-2 mb-8">
                        <button id="btn-底妝" onclick="selectCate('底妝')" class="py-3 text-xs border border-stone-100 rounded-xl transition">底妝</button>
                        <button id="btn-眼妝" onclick="selectCate('眼妝')" class="py-3 text-xs border border-stone-100 rounded-xl transition">眼妝</button>
                        <button id="btn-唇妝" onclick="selectCate('唇妝')" class="py-3 text-xs border border-stone-100 rounded-xl transition">唇妝</button>
                    </div>

                    <h3 class="text-xs font-bold mb-4 tracking-widest text-stone-400 uppercase">Step 2. 產品 Shade</h3>
                    <div id="product-grid" class="grid grid-cols-3 gap-3"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="camera-box aspect-[4/3] shadow-2xl">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="output_canvas"></canvas>
                    <div id="loading-msg" class="absolute inset-0 flex items-center justify-center bg-stone-50 z-20">AI 模型加載中...</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0";

        let faceLandmarker;
        let webcamRunning = false;
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        let activeMakeup = { mode: '', color: 'rgba(0,0,0,0)', mix: 'multiply' };

        const products = {
            '底妝': [
                { name: '01 柔白', color: 'rgba(252, 243, 232, 0.3)', mix: 'soft-light', type: 'fair' },
                { name: '02 自然', color: 'rgba(245, 225, 204, 0.3)', mix: 'soft-light', type: 'medium' }
            ],
            '眼妝': [
                { name: '焦糖', color: 'rgba(139, 69, 19, 0.4)', mix: 'multiply', type: 'medium' },
                { name: '玫瑰', color: 'rgba(188, 143, 143, 0.4)', mix: 'multiply', type: 'fair' }
            ],
            '唇妝': [
                { name: '經典紅', color: 'rgba(153, 27, 27, 0.5)', mix: 'soft-light', type: 'medium' },
                { name: '肉桂', color: 'rgba(160, 82, 45, 0.5)', mix: 'multiply', type: 'fair' }
            ]
        };

        // 初始化 AI 模型
        async function setupAI() {
            const filesetResolver = await FilesetResolver.forTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });
            startWebcam();
        }

        async function startWebcam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => {
                document.getElementById('loading-msg').style.display = 'none';
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
                webcamRunning = true;
                predictWebcam();
                selectCate('底妝');
                document.getElementById('ai-recom-box').classList.remove('hidden');
            });
        }

        // 核心渲染迴圈
        async function predictWebcam() {
            if (!webcamRunning) return;
            const results = faceLandmarker.detectForVideo(video, performance.now());
            
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                const landmarks = results.faceLandmarks[0];
                
                // AI 推薦邏輯：偵測額頭區域亮度 (Landmark 10 為額頭中心)
                const brightness = landmarks[10].z; // 簡單利用深度/亮度模擬
                updateRecommendation(brightness);

                if (activeMakeup.mode === '眼妝') {
                    // 偵測左眼 (Landmarks 468-472) 與 右眼
                    drawMakeup(canvasCtx, landmarks, [33, 160, 158, 133, 153, 144], activeMakeup.color); // 左
                    drawMakeup(canvasCtx, landmarks, [362, 385, 387, 263, 373, 380], activeMakeup.color); // 右
                } else if (activeMakeup.mode === '唇妝') {
                    // 偵測嘴唇外廓 (Landmarks 61, 146, 91...等)
                    drawMakeup(canvasCtx, landmarks, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95], activeMakeup.color);
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function drawMakeup(ctx, landmarks, points, color) {
            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.globalCompositeOperation = activeMakeup.mix;
            points.forEach((idx, i) => {
                const x = landmarks[idx].x * canvasElement.width;
                const y = landmarks[idx].y * canvasElement.height;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fill();
        }

        function updateRecommendation(zValue) {
            const text = document.getElementById('recom-text');
            // z 值越小通常代表臉部越接近鏡頭或受光越強，模擬為亮色系推薦
            if (zValue < -0.05) {
                text.innerText = "✨ 您的膚色透亮，推薦【乾燥玫瑰/柔白】系列";
            } else {
                text.innerText = "🌿 您的膚色健康，推薦【焦糖拿鐵/裸膚】系列";
            }
        }

        // 全域函數綁定 (供按鈕使用)
        window.selectCate = (cat) => {
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('active-cate'));
            document.getElementById(`btn-${cat}`).classList.add('active-cate');
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products[cat].forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-item product-item relative p-2 border rounded-xl cursor-pointer bg-white hover:bg-stone-50';
                div.innerHTML = `<div class="w-full h-8 rounded mb-1" style="background:${p.color}"></div>
                                <div class="text-[10px] font-bold text-center">${p.name}</div>`;
                div.onclick = () => {
                    activeMakeup = { mode: cat, ...p };
                    document.querySelectorAll('.product-item').forEach(i => i.classList.remove('border-stone-800'));
                    div.classList.add('border-stone-800');
                };
                grid.appendChild(div);
            });
        };

        setupAI();
    </script>
</body>
</html>
