<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEME AI Pro 自然暈染系統</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto+Sans+TC', sans-serif; background-color: #fcfaf8; color: #292524; }
        .video-container { position: relative; width: 100%; max-width: 640px; margin: auto; border-radius: 24px; overflow: hidden; background: #000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border: 4px solid #fff; }
        #webcam { width: 100%; height: auto; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .color-dot { @apply w-9 h-9 rounded-full border-2 border-white cursor-pointer transition-all hover:scale-110 active:scale-95 shadow-sm; }
        .tab-btn { @apply px-6 py-2 text-xs font-bold border border-stone-200 rounded-full transition-all text-stone-400 bg-white; }
        .active-tab { @apply bg-stone-800 text-white border-stone-800 shadow-md; }
        .active-dot { @apply border-stone-800 ring-2 ring-stone-200 scale-110; }
        
        /* 提示遮罩樣式 */
        #start-overlay { position: fixed; inset: 0; bg-white/95; z-index: 100; flex flex-col items-center justify-center p-6 text-center transition-opacity; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div id="start-overlay">
        <div class="max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-stone-100">
            <h2 class="text-2xl font-bold mb-6 tracking-widest text-stone-800">歡迎體驗 HEME AI 試妝</h2>
            <div class="space-y-4 text-sm text-stone-600 leading-relaxed mb-10 text-left bg-stone-50 p-6 rounded-2xl border border-stone-100">
                <p class="font-bold text-stone-800">為了確保試妝效果精準自然，請注意：</p>
                <p>1. 💡 <span class="font-bold">正確燈光</span>：請在光源充足且均勻的環境下體驗（例如面向窗戶或室內白光）。</p>
                <p>2. 🚫 <span class="font-bold">避免背光</span>：背光或臉部陰影過重會影響 AI 對膚色與五官的判斷。</p>
                <p>3. 😐 <span class="font-bold">放鬆表情</span>：請面向鏡頭，保持自然放鬆的表情。</p>
            </div>
            <button onclick="startSystem()" class="w-full bg-stone-800 text-white py-4 rounded-full font-bold shadow-lg hover:bg-stone-700 transition tracking-widest">我準備好了，開始體驗</button>
        </div>
    </div>

    <div id="main-content" class="max-w-6xl mx-auto opacity-0 transition-opacity">
        <header class="text-center mb-10">
            <h1 class="text-2xl font-bold tracking-[0.4em] text-stone-800 uppercase">HEME AI Pro</h1>
            <p class="text-[10px] text-stone-400 uppercase tracking-[0.3em] mt-1">High-Precision Virtual Makeup</p>
        </header>

        <div class="grid lg:grid-cols-12 gap-10">
            <div class="lg:col-span-7 relative">
                <div class="video-container">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>
                    <div id="status" class="absolute inset-0 flex items-center justify-center bg-white z-50 transition-opacity">
                        <div class="text-center">
                            <div class="w-8 h-8 border-2 border-stone-100 border-t-stone-800 rounded-full animate-spin mx-auto mb-4"></div>
                            <p class="text-[10px] tracking-widest text-stone-400">正在同步 AI 特徵點...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-stone-50 min-h-[480px] flex flex-col">
                    <div class="flex gap-2 mb-10 justify-center">
                        <button onclick="switchTab('lip', this)" class="tab-btn active-tab">唇彩</button>
                        <button onclick="switchTab('eye', this)" class="tab-btn">眼影</button>
                        <button onclick="switchTab('face', this)" class="tab-btn">底妝</button>
                    </div>

                    <div id="color-selector" class="grid grid-cols-4 gap-6 content-start flex-grow">
                        </div>

                    <div class="mt-12 pt-6 border-t border-stone-100 flex justify-between items-center">
                        <button onclick="resetAll()" class="text-[11px] font-bold text-stone-300 hover:text-red-400 transition tracking-widest">RESET ALL</button>
                        <div class="flex items-center gap-1.5 text-[9px] text-stone-300 tracking-tighter bg-stone-50 px-3 py-1 rounded-full">
                            <div class="w-1 h-1 bg-green-400 rounded-full animate-pulse"></div>
                            ENGINE: FACE-API PRO
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        
        // 核心資料結構：優化基礎透明度 (質感優化關鍵)
        let activeMakeup = {
            lip: { color: null, opacity: 0.35 }, // 唇彩更通透
            eye: { color: null, opacity: 0.2 },  // 眼影更柔和
            face: { color: null, opacity: 0.1 }  // 底妝僅微調 (解決太誇張問題)
        };

        const palette = {
            lip: [
                { name: '柔霧紅', hex: '#991b1b' }, { name: '晨曦橘', hex: '#c2410c' },
                { name: '肉桂粉', hex: '#bc8f8f' }, { name: '乾燥玫瑰', hex: '#881337' }
            ],
            eye: [
                { name: '大地棕', hex: '#451a03' }, { name: '香檳金', hex: '#d97706' },
                { name: '玫瑰金', hex: '#fda4af' }
            ],
            face: [
                { name: '象牙白', hex: '#fef3c7' }, { name: '自然色', hex: '#fde68a' }
            ]
        };

        // 啟動系統函數
        function startSystem() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').remove();
                document.getElementById('main-content').style.opacity = '1';
                init();
            }, 700);
        }

        async function init() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights/';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, frameRate: { ideal: 60 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                status.style.opacity = '0';
                setTimeout(() => status.remove(), 500);
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                switchTab('lip', document.querySelector('.tab-btn'));
                renderLoop();
            };
        }

        async function renderLoop() {
            const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 128 });
            const result = await faceapi.detectSingleFace(video, options).withFaceLandmarks();

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (result) {
                const resized = faceapi.resizeResults(result, { width: canvas.width, height: canvas.height });
                const pts = resized.landmarks;

                // 💡 關鍵修正：材質融合模式改為 soft-light，讓膚質透出來
                ctx.globalCompositeOperation = "soft-light";

                // 1. 底妝 (優化：極低透明度、柔光)
                if (activeMakeup.face.color) {
                    drawArea(ctx, pts.getJawOutline(), activeMakeup.face);
                }
                
                // 2. 眼妝 (優化：只暈染上眼瞼)
                if (activeMakeup.eye.color) {
                    // 左眼上眼瞼座標 (精確定位)
                    drawArea(ctx, [pts.getLeftEye()[0], pts.getLeftEye()[1], pts.getLeftEye()[2], pts.getLeftEye()[3]], activeMakeup.eye);
                    // 右眼上眼瞼座標
                    drawArea(ctx, [pts.getRightEye()[0], pts.getRightEye()[1], pts.getRightEye()[2], pts.getRightEye()[3]], activeMakeup.eye);
                }

                // 3. 唇妝 (優化：分開上下唇繪製，自然黏合)
                if (activeMakeup.lip.color) {
                    // 上唇輪廓
                    drawArea(ctx, [pts.getMouth()[0], pts.getMouth()[1], pts.getMouth()[2], pts.getMouth()[3], pts.getMouth()[4], pts.getMouth()[5], pts.getMouth()[6]], activeMakeup.lip);
                    // 下唇輪廓
                    drawArea(ctx, [pts.getMouth()[6], pts.getMouth()[7], pts.getMouth()[8], pts.getMouth()[9], pts.getMouth()[10], pts.getMouth()[11], pts.getMouth()[0]], activeMakeup.lip);
                }
            }
            requestAnimationFrame(renderLoop);
        }

        function drawArea(ctx, points, makeup) {
            ctx.save();
            ctx.beginPath();
            ctx.fillStyle = makeup.color;
            ctx.globalAlpha = makeup.opacity;
            points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        window.switchTab = (type, el) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            el.classList.add('active-tab');
            const container = document.getElementById('color-selector');
            container.innerHTML = palette[type].map(item => `
                <div class="flex flex-col items-center gap-2">
                    <div onclick="setMakeup('${type}', '${item.hex}', this)" 
                         class="color-dot ${activeMakeup[type].color === item.hex ? 'active-dot' : ''}" 
                         style="background: ${item.hex}"></div>
                    <span class="text-[10px] font-bold text-stone-500">${item.name}</span>
                </div>
            `).join('');
        };

        window.setMakeup = (type, color, el) => {
            activeMakeup[type].color = color;
            el.closest('#color-selector').querySelectorAll('.color-dot').forEach(d => d.classList.remove('active-dot'));
            el.classList.add('active-dot');
        };

        window.resetAll = () => {
            Object.keys(activeMakeup).forEach(k => activeMakeup[k].color = null);
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active-dot'));
        };

    </script>
</body>
</html>
