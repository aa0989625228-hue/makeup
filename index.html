<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Beauty Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fdfcfb; font-family: "PingFang TC", sans-serif; }
        .video-container { 
            position: relative; width: 100%; max-width: 640px; aspect-ratio: 4/3; 
            margin: auto; border-radius: 2.5rem; overflow: hidden; 
            background: #000; border: 8px solid #fff; box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        
        /* 還原原本的 UI 質感 */
        .nav-tab { @apply flex-1 py-4 text-sm font-medium text-stone-400 transition-all text-center; }
        .nav-tab.active { @apply text-stone-900 bg-white shadow-sm rounded-full; }
        
        .color-option { @apply flex flex-col items-center gap-3 cursor-pointer transition-transform active:scale-90; }
        .color-circle { @apply w-14 h-14 rounded-full border-4 border-white shadow-md; }
        .active-circle { @apply ring-4 ring-stone-200 border-stone-800; }
        
        #start-mask { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="start-mask">
        <div class="max-w-md w-full p-8 text-center">
            <h2 class="text-3xl font-bold mb-8 tracking-tighter text-stone-800">歡迎體驗 AI 試妝</h2>
            <div class="bg-stone-50 p-8 rounded-[2.5rem] text-left mb-10 border border-stone-100 shadow-sm">
                <p class="text-lg font-bold mb-4 text-stone-800 italic">為了確保「自然服貼」效果，請注意：</p>
                <div class="space-y-6 text-stone-600">
                    <p>1. 💡 <span class="font-bold">正確燈光</span>：請面向光源，確保臉部光線充足且均勻。</p>
                    <p>2. 🚫 <span class="font-bold">避免陰影</span>：背光或臉部陰影過重會影響 AI 對膚色與質感判斷。</p>
                </div>
            </div>
            <button onclick="startApp()" class="w-full bg-[#262121] text-white py-5 rounded-full text-lg font-bold shadow-xl active:scale-95 transition-transform">我準備好了</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-xl font-bold tracking-[0.5em] text-stone-300 uppercase">NATURAL PRO V8</h1>
        </header>

        <div class="grid lg:grid-cols-12 gap-10 items-start">
            <div class="lg:col-span-7">
                <div class="video-container">
                    <video id="webcam" playsinline muted></video>
                    <canvas id="overlay"></canvas>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-stone-50">
                    <div class="flex p-1.5 bg-stone-100 rounded-full mb-10">
                        <button onclick="switchTab('lip', this)" class="nav-tab active">唇部</button>
                        <button onclick="switchTab('eye', this)" class="nav-tab">眼部</button>
                        <button onclick="switchTab('face', this)" class="nav-tab">底妝</button>
                    </div>

                    <div id="pane-lip" class="grid grid-cols-3 gap-6 pane active">
                        <div onclick="setMakeup('lip','#9f1239',this)" class="color-option">
                            <div class="color-circle" style="background:#9f1239"></div>
                            <span class="text-xs font-bold text-stone-500">玫瑰金</span>
                        </div>
                        <div onclick="setMakeup('lip','#be185d',this)" class="color-option">
                            <div class="color-circle" style="background:#be185d"></div>
                            <span class="text-xs font-bold text-stone-500">大地棕</span>
                        </div>
                    </div>

                    <div id="pane-eye" class="hidden grid grid-cols-3 gap-6 pane">
                        <div onclick="setMakeup('eye','#78350f',this)" class="color-option">
                            <div class="color-circle" style="background:#78350f"></div>
                            <span class="text-xs font-bold text-stone-500">香檳金</span>
                        </div>
                    </div>

                    <div id="pane-face" class="hidden grid grid-cols-3 gap-6 pane">
                        <div onclick="setMakeup('face','#fff1e6',this)" class="color-option">
                            <div class="color-circle" style="background:#fff1e6"></div>
                            <span class="text-xs font-bold text-stone-500">象牙白</span>
                        </div>
                    </div>

                    <div class="mt-20 pt-8 border-t border-stone-50">
                        <button onclick="location.reload()" class="text-[10px] text-stone-300 tracking-[0.2em] uppercase w-full text-center">Reset Engine</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        let makeup = { lip: null, eye: null, face: null };

        async function startApp() {
            document.getElementById('start-mask').classList.add('hidden');
            const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
            
            faceMesh.onResults((res) => {
                canvas.width = video.clientWidth;
                canvas.height = video.clientHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (res.multiFaceLandmarks && res.multiFaceLandmarks[0]) {
                    const pts = res.multiFaceLandmarks[0];

                    // 1. 底妝：關鍵修復（避開眼鏡區域）
                    if (makeup.face) {
                        ctx.save();
                        ctx.beginPath();
                        // 臉部輪廓
                        const faceIdx = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];
                        faceIdx.forEach((id, i) => {
                            const p = pts[id];
                            i === 0 ? ctx.moveTo(p.x * canvas.width, p.y * canvas.height) : ctx.lineTo(p.x * canvas.width, p.y * canvas.height);
                        });
                        
                        // 鏤空：避開眼鏡/眼睛
                        const eyeHole = [33, 133, 153, 145, 362, 263, 374, 380];
                        ctx.moveTo(pts[33].x * canvas.width, pts[33].y * canvas.height);
                        eyeHole.reverse().forEach(id => ctx.lineTo(pts[id].x * canvas.width, pts[id].y * canvas.height));

                        ctx.fillStyle = makeup.face;
                        ctx.globalAlpha = 0.22;
                        ctx.globalCompositeOperation = "soft-light";
                        ctx.filter = "blur(15px)";
                        ctx.fill();
                        ctx.restore();
                    }

                    // 2. 唇妝
                    if (makeup.lip) draw(pts, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291], makeup.lip, 0.45, "multiply", 2);
                    
                    // 3. 眼影
                    if (makeup.eye) {
                        draw(pts, [223, 224, 225, 226, 230, 231, 232], makeup.eye, 0.2, "multiply", 6);
                        draw(pts, [443, 444, 445, 446, 450, 451, 452], makeup.eye, 0.2, "multiply", 6);
                    }
                }
            });

            new Camera(video, { onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480 }).start();
        }

        function draw(pts, idxs, color, alpha, mode, blur) {
            ctx.save();
            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.globalCompositeOperation = mode;
            ctx.filter = `blur(${blur}px)`;
            idxs.forEach((id, i) => {
                const p = pts[id];
                i === 0 ? ctx.moveTo(p.x * canvas.width, p.y * canvas.height) : ctx.lineTo(p.x * canvas.width, p.y * canvas.height);
            });
            ctx.fill();
            ctx.restore();
        }

        window.switchTab = (t, b) => {
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            b.classList.add('active');
            document.querySelectorAll('.pane').forEach(el => el.classList.add('hidden'));
            document.getElementById(`pane-${t}`).classList.remove('hidden');
        };

        window.setMakeup = (t, c, e) => {
            makeup[t] = c;
            e.closest('.pane').querySelectorAll('.color-circle').forEach(el => el.classList.remove('active-circle'));
            e.querySelector('.color-circle').classList.add('active-circle');
        };
    </script>
</body>
</html>
