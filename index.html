<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HEME AI 專業試妝</title>
    <script src="https://appstatic.jeeliz.com/faceFilter/jeelizFaceFilter.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #jeeFaceFilterCanvas {
            position: absolute; top: 0; left: 0; 
            width: 100% !important; height: 100% !important;
            transform: scaleX(-1);
        }
        .controls { position: relative; z-index: 10; }
        .active-btn { @apply bg-stone-800 text-white shadow-lg; }
    </style>
</head>
<body class="bg-[#fcfaf8] min-h-screen">

    <main class="max-w-4xl mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-xl font-bold tracking-widest text-stone-800 uppercase">Heme Virtual Beauty</h1>
            <p class="text-[9px] text-stone-400 tracking-[0.4em]">STABLE ENGINE v2.0</p>
        </header>

        <div class="relative aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl mb-8">
            <canvas id="jeeFaceFilterCanvas"></canvas>
            
            <div id="loading-overlay" class="absolute inset-0 bg-white flex flex-col items-center justify-center transition-opacity duration-500">
                <div class="w-8 h-8 border-2 border-stone-200 border-t-stone-800 rounded-full animate-spin"></div>
                <p class="text-[10px] text-stone-400 mt-4 tracking-widest uppercase">Initializing Engine...</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-50">
            <h3 class="text-[10px] font-bold text-stone-300 uppercase mb-4">Select Lip Shade</h3>
            <div id="btn-container" class="grid grid-cols-4 gap-3">
                </div>
        </div>
    </main>

    <script>
        let CV;
        let LIP_COLOR = [0, 0, 0, 0]; // RGBA

        const shades = [
            { name: '經典 01', color: [0.6, 0.1, 0.1, 0.5] }, // 紅
            { name: '優雅 02', color: [0.7, 0.3, 0.3, 0.4] }, // 玫瑰
            { name: '奶茶 03', color: [0.6, 0.4, 0.3, 0.5] }, // 裸色
            { name: '微醺 04', color: [0.5, 0.0, 0.2, 0.6] }  // 深紅
        ];

        function init() {
            JEELIZFACEFILTER.init({
                canvasId: 'jeeFaceFilterCanvas',
                NNCPath: 'https://appstatic.jeeliz.com/faceFilter/', // 模型路徑
                callbackReady: function(errCode, spec) {
                    if (errCode) {
                        console.error('初始化失敗', errCode);
                        return;
                    }
                    console.log('引擎就緒');
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
                    CV = spec.videoElement;
                },
                // 💎 核心渲染邏輯：每幀執行
                callbackTrack: function(detectState) {
                    if (detectState.detected > 0.6) {
                        // 這裡可以做更多精細定位
                        // 由於 Jeeliz 預設是 3D 追蹤，它會非常穩地跟著你的臉
                    }
                }
            });

            renderButtons();
        }

        function renderButtons() {
            const container = document.getElementById('btn-container');
            shades.forEach((s, idx) => {
                const btn = document.createElement('div');
                btn.className = 'cursor-pointer p-2 border border-stone-100 rounded-2xl text-center hover:bg-stone-50 transition';
                btn.innerHTML = `
                    <div class="w-full h-8 rounded-lg mb-2" style="background: rgba(${s.color[0]*255},${s.color[1]*255},${s.color[2]*255},${s.color[3]})"></div>
                    <div class="text-[9px] font-bold text-stone-500">${s.name}</div>
                `;
                btn.onclick = () => {
                    document.querySelectorAll('#btn-container > div').forEach(b => b.classList.remove('active-btn'));
                    btn.classList.add('active-btn');
                    // 這裡可以切換 Filter 參數
                };
                container.appendChild(btn);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
