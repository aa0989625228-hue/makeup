<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heme AI 專業試妝系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --heme-stone: #a8a29e; --heme-dark: #292524; }
        .camera-box { background: #000; border-radius: 20px; position: relative; overflow: hidden; border: 2px solid #e7e5e4; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* ✨ 核心修復：精準人臉遮罩層 */
        .makeup-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0; transition: all 0.5s ease;
            
            /* 💡 解決「脖子發光」的關鍵：
               1. ellipse at center 35%: 將橢圓中心向上移，避開下半部的脖子與身體。
               2. black 10%, transparent 55%: 縮小顏色核心範圍，讓邊緣在下巴處就消失。
            */
            -webkit-mask-image: radial-gradient(ellipse at center 35%, black 10%, transparent 55%);
            mask-image: radial-gradient(ellipse at center 35%, black 10%, transparent 55%);
        }

        /* 介面樣式 */
        .active-cate { @apply bg-stone-800 text-white shadow-lg scale-105; }
        .product-item { @apply border border-stone-200 p-2 rounded-lg text-center cursor-pointer hover:bg-stone-50 transition bg-white; }
        .active-prod { @apply border-stone-800 ring-2 ring-stone-100 bg-stone-50; }
        .modal { background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-blur: 4px; }
    </style>
</head>
<body class="bg-[#fcfaf8] min-h-screen font-sans text-stone-800">

    <div id="notice-modal" class="fixed inset-0 modal">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full mx-4 text-center shadow-2xl">
            <div class="text-4xl mb-4">💡</div>
            <h3 class="text-xl font-bold mb-2">試妝前提醒 <span class="text-xs font-light text-stone-400 ml-1 text-nowrap">Environment Notice</span></h3>
            <p class="text-stone-500 text-sm mb-6 leading-relaxed">
                為確保妝容自然貼合，請確保您處於**正面受光**且**光線充足**的環境，並盡量露出完整面部。
            </p>
            <button onclick="closeNotice()" class="w-full bg-stone-800 text-white py-3 rounded-xl font-bold hover:bg-black transition">
                開始體驗 <span class="text-xs font-light ml-1">Confirm</span>
            </button>
        </div>
    </div>

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 p-4 border-b border-stone-100 flex justify-center items-center">
        <div class="text-center">
            <h1 class="text-xl font-bold tracking-[0.2em] text-stone-800">虛擬試妝體驗</h1>
            <p class="text-[10px] text-stone-400 uppercase tracking-[0.2em] font-light">Virtual Makeup Experience</p>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 lg:p-8">
        
        <div id="step-start" class="text-center py-20">
            <h2 class="text-3xl font-light mb-2">探索妳的專屬本色</h2>
            <p class="text-stone-400 text-sm mb-10 tracking-widest">Discover Your True Shades</p>
            <button onclick="requestCamera()" class="bg-stone-800 text-white px-12 py-4 rounded-full shadow-xl hover:scale-105 transition-all font-bold">
                立即體驗 Try It On
            </button>
        </div>

        <div id="step-main" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6 order-2 lg:order-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-100">
                    <h3 class="text-xs font-bold mb-4 flex items-center tracking-widest text-stone-400 uppercase">
                        Step 1. 選擇類別 Category
                    </h3>
                    <div class="grid grid-cols-3 gap-2 mb-8">
                        <button id="btn-底妝" onclick="selectCate('底妝')" class="py-3 text-xs border border-stone-100 rounded-xl transition">底妝</button>
                        <button id="btn-眼妝" onclick="selectCate('眼妝')" class="py-3 text-xs border border-stone-100 rounded-xl transition">眼妝</button>
                        <button id="btn-唇妝" onclick="selectCate('唇妝')" class="py-3 text-xs border border-stone-100 rounded-xl transition">唇妝</button>
                    </div>

                    <h3 class="text-xs font-bold mb-4 flex items-center tracking-widest text-stone-400 uppercase">
                        Step 2. 挑選色號 Select Shade
                    </h3>
                    <div id="product-grid" class="grid grid-cols-3 gap-3 max-h-[350px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-8 order-1 lg:order-2">
                <div id="camera-container" class="camera-box aspect-[4/3] shadow-2xl">
                    <video id="webcam" autoplay playsinline></video>
                    <div id="makeup-layer" class="makeup-overlay"></div>
                    <div id="loading" class="absolute inset-0 flex items-center justify-center bg-stone-50 text-stone-400">
                        鏡頭啟動中...
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <button onclick="location.reload()" class="text-stone-300 text-xs hover:text-stone-800">重置 Reset</button>
                    <button onclick="goToCompare()" class="bg-stone-800 text-white px-10 py-3 rounded-xl font-bold shadow-lg text-sm hover:bg-black transition">
                        查看對比 Comparison
                    </button>
                </div>
            </div>
        </div>

        <div id="step-compare" class="hidden bg-white p-6 rounded-3xl shadow-xl">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div>
                    <p class="text-center text-[10px] text-stone-400 mb-2 uppercase tracking-widest">Original</p>
                    <canvas id="c-before" class="w-full rounded-xl shadow-inner bg-stone-50" width="640" height="480"></canvas>
                </div>
                <div>
                    <p class="text-center text-[10px] text-stone-800 mb-2 uppercase tracking-widest font-bold">Enhanced</p>
                    <canvas id="c-after" class="w-full rounded-xl shadow-lg bg-stone-50" width="640" height="480"></canvas>
                </div>
            </div>
            <button onclick="resetTryOn()" class="w-full py-4 text-stone-500 font-bold border-t border-stone-100 hover:text-stone-800">返回修改 Back</button>
        </div>
    </main>

    <script>
        let stream = null;
        let activeMakeup = { mode: '', color: '', filter: '', mix: '' };

        // 參考 heme 色調的產品清單
        const products = {
            '底妝': [
                { name: '01 柔白', en: 'Ivory', color: '#fcf3e8', filter: 'brightness(1.05) contrast(0.95) blur(0.5px)', mix: 'soft-light' },
                { name: '02 自然', en: 'Beige', color: '#f5e1cc', filter: 'brightness(1.0) contrast(0.98) blur(0.5px)', mix: 'soft-light' },
                { name: '03 裸膚', en: 'Sand', color: '#eccfb2', filter: 'brightness(0.95) contrast(1.0) blur(0.5px)', mix: 'soft-light' }
            ],
            '眼妝': [
                { name: '焦糖', en: 'Caramel', color: '#8b451355', filter: 'sepia(0.3) contrast(1.1)', mix: 'multiply' },
                { name: '玫瑰', en: 'Rose', color: '#bc8f8f66', filter: 'sepia(0.2) saturate(1.2)', mix: 'multiply' },
                { name: '藕粉', en: 'Mauve', color: '#a37c7c55', filter: 'saturate(1.1)', mix: 'multiply' },
                { name: '大地', en: 'Earth', color: '#634b3544', filter: 'brightness(0.9) contrast(1.1)', mix: 'multiply' }
            ],
            '唇妝': [
                { name: '紅酒', en: 'Wine', color: '#7f1d1d66', filter: 'saturate(1.5)', mix: 'soft-light' },
                { name: '珊瑚', en: 'Coral', color: '#c2410c55', filter: 'hue-rotate(15deg) saturate(1.5)', mix: 'soft-light' },
                { name: '豆沙', en: 'Bean', color: '#9d5b5b77', filter: 'brightness(0.9) saturate(1.3)', mix: 'multiply' },
                { name: '肉桂', en: 'Nude', color: '#a0522d66', filter: 'sepia(0.4) saturate(1.2)', mix: 'multiply' }
            ]
        };

        function closeNotice() { document.getElementById('notice-modal').style.display = 'none'; }

        async function requestCamera() {
            document.getElementById('step-start').classList.add('hidden');
            document.getElementById('step-main').classList.remove('hidden');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                document.getElementById('webcam').srcObject = stream;
                document.getElementById('loading').style.display = 'none';
                selectCate('底妝'); // 預設類別
            } catch (e) { alert("無法存取鏡頭，請確認是否為 HTTPS 環境並允許權限。"); }
        }

        function selectCate(cat) {
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('active-cate'));
            document.getElementById(`btn-${cat}`).classList.add('active-cate');
            
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products[cat].forEach(p => {
                const btn = document.createElement('div');
                btn.className = 'product-item';
                btn.innerHTML = `<div class="w-full h-10 rounded mb-2 shadow-inner" style="background:${p.color}"></div>
                                <div class="text-[10px] font-bold text-stone-700">${p.name}</div>
                                <div class="text-[8px] text-stone-400 uppercase tracking-tighter">${p.en}</div>`;
                btn.onclick = () => {
                    document.querySelectorAll('.product-item').forEach(i => i.classList.remove('active-prod'));
                    btn.classList.add('active-prod');
                    applyMakeup(p);
                };
                grid.appendChild(btn);
            });
        }

        function applyMakeup(p) {
            const video = document.getElementById('webcam');
            const layer = document.getElementById('makeup-layer');
            activeMakeup = p;

            // 調整視訊濾鏡
            video.style.filter = `scaleX(-1) ${p.filter}`;
            
            // 調整色彩貼合層
            layer.style.opacity = '1';
            layer.style.background = p.color;
            layer.style.mixBlendMode = p.mix;
        }

        function goToCompare() {
            document.getElementById('step-main').classList.add('hidden');
            document.getElementById('step-compare').classList.remove('hidden');
            const v = document.getElementById('webcam');
            const cB = document.getElementById('c-before'), ctxB = cB.getContext('2d');
            const cA = document.getElementById('c-after'), ctxA = cA.getContext('2d');

            // 繪製原始圖像
            ctxB.save(); ctxB.scale(-1, 1); ctxB.drawImage(v, -640, 0, 640, 480); ctxB.restore();
            
            // 繪製妝後圖像
            ctxA.save(); ctxA.scale(-1, 1);
            if(activeMakeup.filter) ctxA.filter = activeMakeup.filter;
            ctxA.drawImage(v, -640, 0, 640, 480);
            
            // 模擬遮罩效果到 Canvas 上
            if(activeMakeup.color) {
                const grad = ctxA.createRadialGradient(-320, 168, 40, -320, 168, 260); // 中心點上移 (35% of 480px = 168px)
                grad.addColorStop(0, activeMakeup.color);
                grad.addColorStop(1, 'transparent');
                
                ctxA.globalCompositeOperation = activeMakeup.mix === 'multiply' ? 'multiply' : 'soft-light';
                ctxA.fillStyle = grad;
                ctxA.fillRect(-640, 0, 640, 480);
            }
            ctxA.restore();
        }

        function resetTryOn() {
            document.getElementById('step-compare').classList.add('hidden');
            document.getElementById('step-main').classList.remove('hidden');
        }
    </script>
</body>
</html>
