<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heme AI 智慧試妝系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .camera-box { background: #1a1a1a; border-radius: 24px; position: relative; overflow: hidden; border: 3px solid #e7e5e4; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
        .active-cate { @apply bg-stone-800 text-white shadow-lg; }
        .product-item { @apply border border-stone-200 p-2 rounded-xl text-center cursor-pointer bg-white hover:bg-stone-50 transition; }
        .active-prod { @apply border-stone-800 ring-2 ring-stone-100; }
        .recommend-tag { @apply absolute -top-2 -right-1 bg-amber-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold animate-pulse; }
    </style>
</head>
<body class="bg-[#fcfaf8] min-h-screen text-stone-800 font-sans">

    <div id="step-start" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-12 rounded-[2rem] shadow-2xl text-center max-w-md w-full border border-stone-100">
            <h2 class="text-3xl font-light mb-2 tracking-widest">探索妳的專屬本色</h2>
            <p class="text-stone-400 text-xs mb-10 tracking-widest uppercase">AI Digital Beauty Analysis</p>
            <button id="main-start-btn" onclick="startSystem()" class="w-full bg-stone-800 text-white py-4 rounded-full font-bold hover:scale-105 transition shadow-2xl disabled:opacity-50">
                立即體驗 Try It On
            </button>
            <p id="status-msg" class="mt-4 text-[10px] text-amber-600 font-medium">系統預熱中，請稍候...</p>
        </div>
    </div>

    <div id="step-main" class="hidden max-w-7xl mx-auto p-4 lg:p-10">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                    <div id="api-box" class="mb-6 p-4 bg-stone-50 rounded-2xl border-l-4 border-stone-800 transition-all duration-500 opacity-50">
                        <div class="flex items-center mb-2">
                            <span class="flex h-2 w-2 rounded-full bg-green-500 mr-2 animate-ping"></span>
                            <h4 class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Backend API Analysis</h4>
                        </div>
                        <p id="recom-text" class="text-xs font-bold text-stone-700 leading-relaxed italic">偵測五官特徵中...</p>
                    </div>

                    <h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-4">Step 1. 選擇類別</h3>
                    <div class="grid grid-cols-3 gap-2 mb-8">
                        <button id="btn-底妝" onclick="selectCate('底妝')" class="py-3 text-xs border rounded-xl transition">底妝</button>
                        <button id="btn-眼妝" onclick="selectCate('眼妝')" class="py-3 text-xs border rounded-xl transition">眼妝</button>
                        <button id="btn-唇妝" onclick="selectCate('唇妝')" class="py-3 text-xs border rounded-xl transition">唇妝</button>
                    </div>

                    <h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-4">Step 2. 產品 Shade</h3>
                    <div id="product-grid" class="grid grid-cols-3 gap-3"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="camera-box aspect-[4/3] shadow-2xl">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="output_canvas"></canvas>
                    <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-20">
                        <div class="w-10 h-10 border-4 border-stone-200 border-t-stone-800 rounded-full animate-spin mb-4"></div>
                        <p class="text-xs text-stone-400 tracking-widest">正在建立 API 加密連線...</p>
                    </div>
                </div>
                <div class="mt-6 flex justify-between items-center px-4">
                    <button onclick="location.reload()" class="text-stone-300 text-xs hover:text-stone-800 underline">Reset</button>
                    <button onclick="goToCompare()" class="bg-indigo-600 text-white px-12 py-3 rounded-2xl font-bold shadow-xl hover:bg-indigo-700 transition">查看差異對比</button>
                </div>
            </div>
        </div>
    </div>

    <div id="step-compare" class="hidden fixed inset-0 bg-white z-50 p-6 flex flex-col items-center overflow-y-auto">
        <h2 class="text-2xl font-bold mb-10 tracking-[0.3em]">RESULT COMPARISON</h2>
        <div class="grid md:grid-cols-2 gap-8 w-full max-w-5xl mb-12">
            <canvas id="c-before" class="w-full rounded-3xl shadow-lg border" width="640" height="480"></canvas>
            <canvas id="c-after" class="w-full rounded-3xl shadow-lg border" width="640" height="480"></canvas>
        </div>
        <button onclick="document.getElementById('step-compare').classList.add('hidden')" class="bg-stone-800 text-white px-16 py-3 rounded-full font-bold">返回體驗</button>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0";

        let faceLandmarker;
        let video = document.getElementById("webcam");
        let canvasElement = document.getElementById("output_canvas");
        let canvasCtx = canvasElement.getContext("2d");
        let activeMakeup = { mode: '', color: 'rgba(0,0,0,0)', mix: 'multiply' };
        let currentSkinData = 'medium';

        // 模擬大數據產品資料庫 (這部分未來可以放進 API 回傳)
        const products = {
            '底妝': [
                { id: 101, name: '柔白 Ivory', color: 'rgba(252, 243, 232, 0.3)', mix: 'soft-light', match: 'fair' },
                { id: 102, name: '自然 Beige', color: 'rgba(245, 225, 204, 0.3)', mix: 'soft-light', match: 'medium' }
            ],
            '眼妝': [
                { id: 201, name: '焦糖 Caramel', color: 'rgba(139, 69, 19, 0.4)', mix: 'multiply', match: 'medium' },
                { id: 202, name: '玫瑰 Rose', color: 'rgba(188, 143, 143, 0.4)', mix: 'multiply', match: 'fair' }
            ],
            '唇妝': [
                { id: 301, name: '經典紅 Wine', color: 'rgba(153, 27, 27, 0.5)', mix: 'soft-light', match: 'medium' },
                { id: 302, name: '豆沙 Bean', color: 'rgba(157, 91, 91, 0.6)', mix: 'multiply', match: 'fair' }
            ]
        };

        // 💡 系統啟動流程
        window.startSystem = async () => {
            const btn = document.getElementById('main-start-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true;
            status.innerText = "正在載入 AI 模型...";

            try {
                // 1. 初始化 MediaPipe
                const filesetResolver = await FilesetResolver.forTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { 
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO", numFaces: 1
                });

                // 2. 切換 UI 並開啟鏡頭
                document.getElementById('step-start').classList.add('hidden');
                document.getElementById('step-main').classList.remove('hidden');
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadeddata = () => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    canvasElement.width = video.videoWidth;
                    canvasElement.height = video.videoHeight;
                    requestAnimationFrame(predictLoop);
                    window.selectCate('底妝');
                };
            } catch (err) {
                alert("啟動失敗：請確認網路連線或使用 HTTPS");
                location.reload();
            }
        };

        // 💡 模擬 API 呼叫 (資管專題重點：呈現 API 邏輯)
        async function callRecommendationAPI(faceValue) {
            // 這裡模擬將臉部數值傳送到後端大數據伺服器
            const skinType = faceValue < -0.045 ? 'fair' : 'medium';
            const recomBox = document.getElementById('api-box');
            recomBox.style.opacity = "1";
            
            const text = document.getElementById('recom-text');
            text.innerText = skinType === 'fair' ? "數據回傳：檢測為「明亮膚色」，推薦偏粉或柔白色系。" : "數據回傳：檢測為「健康膚色」，推薦暖色或大地色系。";
            
            return skinType;
        }

        async function predictLoop() {
            const results = faceLandmarker.detectForVideo(video, performance.now());
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                const pts = results.faceLandmarks[0];
                
                // 每秒模擬發送一次 API 請求進行偵測
                if (Math.random() > 0.98) {
                    currentSkinData = await callRecommendationAPI(pts[10].z);
                    updateUIRecoTags();
                }

                // 精準五官渲染
                if (activeMakeup.mode === '眼妝') {
                    drawLayer(canvasCtx, pts, [33, 160, 158, 133, 153, 144], activeMakeup.color);
                    drawLayer(canvasCtx, pts, [362, 385, 387, 263, 373, 380], activeMakeup.color);
                } else if (activeMakeup.mode === '唇妝') {
                    drawLayer(canvasCtx, pts, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291], activeMakeup.color);
                }
            }
            requestAnimationFrame(predictLoop);
        }

        function drawLayer(ctx, pts, idxs, color) {
            ctx.beginPath(); ctx.fillStyle = color; ctx.globalCompositeOperation = activeMakeup.mix;
            idxs.forEach((id, i) => {
                const x = pts[id].x * canvasElement.width;
                const y = pts[id].y * canvasElement.height;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.fill();
        }

        window.selectCate = (cat) => {
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('active-cate'));
            document.getElementById(`btn-${cat}`).classList.add('active-cate');
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            products[cat].forEach(p => {
                const div = document.createElement('div');
                div.className = `product-item relative ${p.match === currentSkinData ? 'border-amber-400' : ''}`;
                div.innerHTML = `
                    ${p.match === currentSkinData ? '<div class="recommend-tag">AI 推薦</div>' : ''}
                    <div class="w-full h-8 rounded mb-1 shadow-inner" style="background:${p.color}"></div>
                    <div class="text-[10px] font-bold">${p.name}</div>
                `;
                div.onclick = () => {
                    activeMakeup = { mode: cat, ...p };
                    document.querySelectorAll('.product-item').forEach(i => i.classList.remove('active-prod'));
                    div.classList.add('active-prod');
                    if(cat==='底妝') video.style.filter = 'scaleX(-1) brightness(1.08)'; else video.style.filter = 'scaleX(-1)';
                };
                grid.appendChild(div);
            });
        };

        function updateUIRecoTags() {
            // 當 API 數據更新時，重新刷一次 UI
            const currentCat = document.querySelector('.active-cate')?.innerText;
            if (currentCat) window.selectCate(currentCat);
        }

        window.goToCompare = () => {
            document.getElementById('step-compare').classList.remove('hidden');
            const b = document.getElementById('c-before').getContext('2d');
            const a = document.getElementById('c-after').getContext('2d');
            b.save(); b.scale(-1, 1); b.drawImage(video, -640, 0, 640, 480); b.restore();
            a.save(); a.scale(-1, 1); a.drawImage(video, -640, 0, 640, 480); a.restore();
        };
    </script>
</body>
</html>
