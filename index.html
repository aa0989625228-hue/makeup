<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Beauty Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fcfcfc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
        .video-wrapper { 
            position: relative; width: 100%; max-width: 500px; aspect-ratio: 3/4; 
            margin: auto; border-radius: 2.5rem; overflow: hidden; 
            background: #000; border: 6px solid #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); pointer-events: none; }
        
        .tab-btn { @apply flex-1 py-3 text-sm font-bold text-stone-400 transition-all text-center rounded-full; }
        .tab-btn.active { @apply text-stone-900 bg-white shadow-sm; }
        
        .color-item { @apply flex flex-col items-center gap-2 cursor-pointer active:scale-95 transition-transform; }
        .color-ring { @apply w-12 h-12 rounded-full border-[3px] border-white shadow-md; }
        .color-item.selected .color-ring { @apply ring-2 ring-stone-800 ring-offset-2; }
        
        #gate { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="gate">
        <div class="max-w-md w-full p-8 text-center">
            <h2 class="text-2xl font-black mb-8 text-stone-900 tracking-wide">歡迎體驗 AI 試妝</h2>
            <div class="bg-stone-50 p-6 rounded-[2rem] text-left mb-10 border border-stone-100 shadow-sm">
                <p class="text-sm font-bold mb-4 text-stone-800">為了確保「自然服貼」效果，請注意：</p>
                <div class="space-y-3 text-xs text-stone-500 leading-relaxed">
                    <p>💡 <span class="font-bold">正確燈光</span>：請面向光源，確保臉部光線充足且均勻。</p>
                    <p>🚫 <span class="font-bold">避免陰影</span>：背光或臉部陰影過重會影響 AI 對膚色與質感判斷。</p>
                </div>
            </div>
            <button onclick="bootSystem()" class="w-full bg-[#292524] text-white py-4 rounded-full text-base font-bold shadow-lg">我準備好了</button>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="text-center mb-6 mt-2">
            <h1 class="text-sm font-bold tracking-[0.4em] text-stone-300 uppercase">Pro V8 Natural</h1>
        </header>

        <div class="video-wrapper mb-8">
            <video id="webcam" playsinline autoplay muted></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-stone-100">
            <div class="flex p-1 bg-stone-100 rounded-full mb-8">
                <button onclick="switchTab('lip', this)" class="tab-btn active">唇部</button>
                <button onclick="switchTab('eye', this)" class="tab-btn">眼部</button>
                <button onclick="switchTab('face', this)" class="tab-btn">底妝</button>
            </div>

            <div id="tab-lip" class="grid grid-cols-4 gap-3 makeup-panel">
                <div onclick="applyMakeup('lip','#B03030',this)" class="color-item">
                    <div class="color-ring" style="background:#B03030"></div>
                    <span class="text-[10px] font-bold text-stone-500">經典紅</span>
                </div>
                <div onclick="applyMakeup('lip','#D67B7B',this)" class="color-item">
                    <div class="color-ring" style="background:#D67B7B"></div>
                    <span class="text-[10px] font-bold text-stone-500">玫瑰金</span>
                </div>
                <div onclick="applyMakeup('lip','#A35D4D',this)" class="color-item">
                    <div class="color-ring" style="background:#A35D4D"></div>
                    <span class="text-[10px] font-bold text-stone-500">大地棕</span>
                </div>
                <div onclick="applyMakeup('lip','#E06666',this)" class="color-item">
                    <div class="color-ring" style="background:#E06666"></div>
                    <span class="text-[10px] font-bold text-stone-500">芭比粉</span>
                </div>
            </div>

            <div id="tab-eye" class="hidden grid grid-cols-4 gap-3 makeup-panel">
                <div onclick="applyMakeup('eye','#63403A',this)" class="color-item">
                    <div class="color-ring" style="background:#63403A"></div>
                    <span class="text-[10px] font-bold text-stone-500">大地棕</span>
                </div>
                <div onclick="applyMakeup('eye','#C5A059',this)" class="color-item">
                    <div class="color-ring" style="background:#C5A059"></div>
                    <span class="text-[10px] font-bold text-stone-500">香檳金</span>
                </div>
                <div onclick="applyMakeup('eye','#D4A5A5',this)" class="color-item">
                    <div class="color-ring" style="background:#D4A5A5"></div>
                    <span class="text-[10px] font-bold text-stone-500">甜心粉</span>
                </div>
            </div>

            <div id="tab-face" class="hidden grid grid-cols-4 gap-3 makeup-panel">
                <div onclick="applyMakeup('face','#F3E0D0',this)" class="color-item">
                    <div class="color-ring" style="background:#F3E0D0"></div>
                    <span class="text-[10px] font-bold text-stone-500">象牙色</span>
                </div>
                <div onclick="applyMakeup('face','#E8D0BB',this)" class="color-item">
                    <div class="color-ring" style="background:#E8D0BB"></div>
                    <span class="text-[10px] font-bold text-stone-500">自然色</span>
                </div>
            </div>
            
            <div class="mt-8 text-center">
                <button onclick="window.location.reload()" class="text-[10px] text-stone-300 tracking-[0.2em] uppercase">Reset Engine</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        let currentMakeup = { lip: null, eye: null, face: null };
        let faceMesh;

        async function bootSystem() {
            document.getElementById('gate').style.display = 'none';
            try {
                faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
                faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
                faceMesh.onResults(onResults);
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadeddata = () => {
                    video.play();
                    async function sendFrame() {
                        if (!video.paused && !video.ended) {
                            await faceMesh.send({image: video});
                            requestAnimationFrame(sendFrame); 
                        }
                    }
                    sendFrame();
                };
            } catch (error) { alert("啟動失敗"); }
        }

        function onResults(results) {
            if (video.videoWidth > 0) { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
                const pts = results.multiFaceLandmarks[0];
                if (currentMakeup.face) {
                    ctx.save(); ctx.beginPath();
                    const faceContour = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];
                    faceContour.forEach((id, i) => { const p = pts[id]; i === 0 ? ctx.moveTo(p.x * canvas.width, p.y * canvas.height) : ctx.lineTo(p.x * canvas.width, p.y * canvas.height); });
                    const eyeHoles = [33, 133, 153, 145, 362, 263, 374, 380];
                    ctx.moveTo(pts[33].x * canvas.width, pts[33].y * canvas.height);
                    eyeHoles.reverse().forEach(id => ctx.lineTo(pts[id].x * canvas.width, pts[id].y * canvas.height));
                    ctx.fillStyle = currentMakeup.face; ctx.globalAlpha = 0.22; ctx.globalCompositeOperation = "soft-light"; ctx.filter = "blur(15px)"; ctx.fill('evenodd'); ctx.restore();
                }
                if (currentMakeup.lip) drawPart(pts, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291], currentMakeup.lip, 0.45, "multiply", 2);
                if (currentMakeup.eye) {
                    drawPart(pts, [223, 224, 225, 226, 230, 231, 232], currentMakeup.eye, 0.2, "multiply", 8);
                    drawPart(pts, [443, 444, 445, 446, 450, 451, 452], currentMakeup.eye, 0.2, "multiply", 8);
                }
            }
        }

        function drawPart(pts, idxs, color, alpha, blendMode, blurVal) {
            ctx.save(); ctx.beginPath(); ctx.fillStyle = color; ctx.globalAlpha = alpha; ctx.globalCompositeOperation = blendMode; ctx.filter = `blur(${blurVal}px)`;
            idxs.forEach((id, i) => { const p = pts[id]; i === 0 ? ctx.moveTo(p.x * canvas.width, p.y * canvas.height) : ctx.lineTo(p.x * canvas.width, p.y * canvas.height); });
            ctx.fill(); ctx.restore();
        }

        window.switchTab = (tabId, btnElement) => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.querySelectorAll('.makeup-panel').forEach(panel => panel.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
        };

        window.applyMakeup = (part, colorCode, itemElement) => {
            currentMakeup[part] = colorCode;
            itemElement.closest('.makeup-panel').querySelectorAll('.color-item').forEach(item => item.classList.remove('selected'));
            itemElement.classList.add('selected');
        };
    </script>
</body>
</html>
