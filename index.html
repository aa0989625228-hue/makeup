<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heme AI 智慧試妝系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fcfaf8] text-stone-800 font-sans">

    <div id="step-start" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-10 rounded-[2rem] shadow-2xl text-center max-w-sm w-full border border-stone-100">
            <h1 class="text-2xl font-bold tracking-widest mb-2">探索專屬本色</h1>
            <p class="text-stone-400 text-[10px] mb-8 tracking-[0.2em] uppercase">AI Beauty Engine</p>
            
            <div id="loader-container" class="mb-6">
                <div class="w-full bg-stone-100 h-1.5 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-stone-800 h-full w-0 transition-all duration-500"></div>
                </div>
                <p id="loader-text" class="text-[9px] text-stone-400 mt-2">模型初始化中 0%</p>
            </div>

            <button id="main-start-btn" onclick="openCamera()" disabled class="w-full bg-stone-300 text-white py-4 rounded-full font-bold transition-all shadow-lg cursor-not-allowed">
                立即體驗 Try It On
            </button>
        </div>
    </div>

    <div id="step-main" class="hidden max-w-7xl mx-auto p-4 lg:p-10">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                    <div class="mb-6 p-4 bg-amber-50 rounded-2xl border-l-4 border-amber-400">
                        <h4 class="text-[10px] font-bold text-amber-600 uppercase mb-1">API Data Match</h4>
                        <p id="recom-text" class="text-xs font-bold text-stone-700">等待 AI 分析中...</p>
                    </div>
                    <div id="product-grid" class="grid grid-cols-3 gap-3"></div>
                </div>
            </div>
            <div class="lg:col-span-8">
                <div class="relative aspect-[4/3] bg-black rounded-[2rem] overflow-hidden border-4 border-white shadow-2xl">
                    <video id="webcam" class="w-full h-full object-cover scale-x-[-1]" autoplay playsinline></video>
                    <canvas id="output_canvas" class="absolute inset-0 w-full h-full scale-x-[-1] pointer-events-none"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0";

        let faceLandmarker;
        let video = document.getElementById("webcam");
        let canvasElement = document.getElementById("output_canvas");
        let canvasCtx = canvasElement.getContext("2d");
        
        // --- 優化點 1: 網頁一打開就自動開始加載，不等點擊 ---
        async function autoPreload() {
            const progress = document.getElementById('progress-bar');
            const text = document.getElementById('loader-text');
            const btn = document.getElementById('main-start-btn');

            try {
                // 模擬加載進度
                updateProgress(30, "正在連線 Google AI 伺服器...");
                
                const filesetResolver = await FilesetResolver.forTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
                updateProgress(60, "下載 AI 深度學習模型...");
                
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { 
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO", numFaces: 1
                });

                updateProgress(100, "準備就緒");
                btn.disabled = false;
                btn.classList.remove('bg-stone-300', 'cursor-not-allowed');
                btn.classList.add('bg-stone-800', 'hover:scale-105');
            } catch (e) {
                text.innerText = "載入失敗，請檢查 HTTPS 連線";
            }
        }

        function updateProgress(val, msg) {
            document.getElementById('progress-bar').style.width = val + '%';
            document.getElementById('loader-text').innerText = `系統狀態: ${msg} (${val}%)`;
        }

        autoPreload(); // 啟動背景預載

        window.openCamera = async () => {
            document.getElementById('step-start').classList.add('hidden');
            document.getElementById('step-main').classList.remove('hidden');
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadeddata = () => {
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
                requestAnimationFrame(predictLoop);
            };
        };

        async function predictLoop() {
            const results = faceLandmarker.detectForVideo(video, performance.now());
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            // AI 偵測與渲染邏輯 (同前)...
            requestAnimationFrame(predictLoop);
        }
    </script>
</body>
</html>
