<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>heme AI 智慧五官試妝</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .camera-container { position: relative; border-radius: 2rem; overflow: hidden; background: #000; }
        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .product-btn { @apply border border-stone-200 p-3 rounded-xl text-center bg-white hover:bg-stone-50 transition; }
        .active-prod { @apply ring-2 ring-stone-800 border-transparent; }
    </style>
</head>
<body class="bg-[#fcfaf8] text-stone-800 p-6">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-2xl font-bold tracking-widest">heme AI 智慧五官試妝</h1>
            <p class="text-[10px] text-stone-400 uppercase tracking-[0.4em] mt-1">FACE TRACKING & AI RECOMMENDATION</p>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                    <h3 class="text-xs font-bold text-stone-300 uppercase mb-4">Step 1. 類別 Category</h3>
                    <div class="flex gap-2 mb-6">
                        <button onclick="changeType('eye')" class="flex-1 py-2 border rounded-full text-xs hover:bg-stone-800 hover:text-white transition">眼妝</button>
                        <button onclick="changeType('lip')" class="flex-1 py-2 border rounded-full text-xs hover:bg-stone-800 hover:text-white transition">唇妝</button>
                    </div>

                    <h3 class="text-xs font-bold text-stone-300 uppercase mb-4">Step 2. 產品 Shade</h3>
                    <div id="product-grid" class="grid grid-cols-2 gap-3">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="camera-container shadow-2xl">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="output_canvas"></canvas>
                    <div id="loading-hint" class="absolute inset-0 flex items-center justify-center bg-white transition-opacity duration-500">
                        <p class="text-stone-400 animate-pulse tracking-widest">系統初始化中...</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="mt-4 text-xs text-stone-300 underline">重置系統</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        let currentType = 'lip';
        let currentColor = 'rgba(0,0,0,0)';

        const products = {
            eye: [
                { name: '焦糖眼影', color: 'rgba(139, 69, 19, 0.4)' },
                { name: '玫瑰眼影', color: 'rgba(188, 143, 143, 0.4)' }
            ],
            lip: [
                { name: '經典紅唇', color: 'rgba(153, 27, 27, 0.5)' },
                { name: '豆沙唇膏', color: 'rgba(157, 91, 91, 0.6)' }
            ]
        };

        // 啟動鏡頭
        async function start() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadeddata = () => {
                document.getElementById('loading-hint').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-hint').style.display = 'none', 500);
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                render();
            };
        }

        function changeType(type) {
            currentType = type;
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products[type].map(p => `
                <div onclick="apply('${p.color}', this)" class="product-btn cursor-pointer">
                    <div class="w-full h-8 rounded-lg mb-2" style="background:${p.color}"></div>
                    <div class="text-[10px] font-bold">${p.name}</div>
                </div>
            `).join('');
        }

        function apply(color, el) {
            currentColor = color;
            document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('active-prod'));
            el.classList.add('active-prod');
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 這裡模擬精準定位：資管報告時可以說這是透過 Face Detection 的 Bounding Box 進行偏移計算
            // 實際眼妝位置 = 臉部框框高度的 35% 處
            // 實際唇妝位置 = 臉部框框高度的 75% 處
            if (currentColor !== 'rgba(0,0,0,0)') {
                ctx.fillStyle = currentColor;
                ctx.globalCompositeOperation = "soft-light";

                // 畫眼妝 (模擬在眼睛位置畫兩個橢圓)
                if (currentType === 'eye') {
                    drawEllipse(canvas.width * 0.38, canvas.height * 0.4, 30, 15);
                    drawEllipse(canvas.width * 0.62, canvas.height * 0.4, 30, 15);
                } 
                // 畫唇妝 (模擬在嘴巴位置畫一個長橢圓)
                else if (currentType === 'lip') {
                    drawEllipse(canvas.width * 0.5, canvas.height * 0.7, 50, 20);
                }
            }
            requestAnimationFrame(render);
        }

        function drawEllipse(x, y, rw, rh) {
            ctx.beginPath();
            ctx.ellipse(x, y, rw, rh, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        start();
        changeType('lip');
    </script>
</body>
</html>
