<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heme AI 智慧試妝系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .camera-box { background: #000; border-radius: 24px; position: relative; overflow: hidden; border: 1px solid #e7e5e4; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
        .active-cate { @apply bg-stone-800 text-white shadow-md; }
        .product-item { @apply border border-stone-100 p-3 rounded-2xl text-center bg-white hover:bg-stone-50 transition-all duration-300; }
        .active-prod { @apply border-stone-800 ring-2 ring-stone-100; }
    </style>
</head>
<body class="bg-[#fcfaf8] min-h-screen text-stone-800">

    <div id="loading-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-stone-200 border-t-stone-800 rounded-full animate-spin mb-4"></div>
        <p class="text-stone-400 tracking-[0.3em] text-xs uppercase">AI Engine Initializing</p>
        <p id="retry-msg" class="text-[10px] text-stone-300 mt-4 hidden">網路連線較慢，正在嘗試備用路徑...</p>
    </div>

    <main class="max-w-6xl mx-auto p-4 lg:p-12">
        <header class="text-center mb-10">
            <h1 class="text-2xl font-bold tracking-widest text-stone-800">heme AI 智慧五官試妝</h1>
            <p class="text-[10px] text-stone-400 uppercase tracking-[0.4em] mt-1">Professional Makeup Simulation</p>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-stone-50">
                    <h3 class="text-[11px] font-bold text-stone-300 uppercase tracking-widest mb-4">Step 1. 類別</h3>
                    <div class="grid grid-cols-2 gap-2 mb-10">
                        <button id="btn-眼妝" onclick="selectCate('眼妝')" class="py-3 text-xs border rounded-xl transition-all">精緻眼妝</button>
                        <button id="btn-唇妝" onclick="selectCate('唇妝')" class="py-3 text-xs border rounded-xl transition-all">專業唇膏</button>
                    </div>

                    <h3 class="text-[11px] font-bold text-stone-300 uppercase tracking-widest mb-4">Step 2. 產品</h3>
                    <div id="product-grid" class="grid grid-cols-2 gap-3"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="camera-box aspect-[4/3] shadow-2xl">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="output_canvas"></canvas>
                </div>
                <div class="mt-6 flex justify-between items-center text-[10px] text-stone-400 px-4">
                    <span>STATUS: <span id="api-status" class="text-green-600">CONNECTED</span></span>
                    <button onclick="location.reload()" class="underline uppercase tracking-widest">Restart System</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0";

        let faceLandmarker;
        let video = document.getElementById("webcam");
        let canvasElement = document.getElementById("output_canvas");
        let canvasCtx = canvasElement.getContext("2d");
        let activeMakeup = { mode: '', color: 'transparent', mix: 'multiply' };

        const products = {
            '眼妝': [
                { name: '特調 01', color: 'rgba(139, 69, 19, 0.35)', mix: 'multiply' },
                { name: '特調 02', color: 'rgba(188, 143, 143, 0.35)', mix: 'multiply' }
            ],
            '唇妝': [
                { name: '經典 10', color: 'rgba(153, 27, 27, 0.45)', mix: 'soft-light' },
                { name: '經典 11', color: 'rgba(157, 91, 91, 0.55)', mix: 'multiply' }
            ]
        };

        async function init() {
            setTimeout(() => document.getElementById('retry-msg').classList.remove('hidden'), 3000);
            
            try {
                const filesetResolver = await FilesetResolver.forTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { 
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO", numFaces: 1
                });
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadeddata = () => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-screen').remove(), 500);
                    canvasElement.width = video.videoWidth;
                    canvasElement.height = video.videoHeight;
                    selectCate('唇妝');
                    render();
                };
            } catch (e) {
                console.error("AI 載入失敗:", e);
                document.getElementById('api-status').innerText = "OFFLINE (MODE: MANUAL)";
                // 如果 AI 載入失敗，依然開啟鏡頭讓使用者能 Demo
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                document.getElementById('loading-screen').remove();
            }
        }

        function render() {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (faceLandmarker) {
                const result = faceLandmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks.length > 0) {
                    const pts = result.faceLandmarks[0];
                    canvasCtx.globalCompositeOperation = activeMakeup.mix;
                    canvasCtx.fillStyle = activeMakeup.color;

                    if (activeMakeup.mode === '眼妝') {
                        drawPath(canvasCtx, pts, [33, 160, 158, 133, 153, 144]); // 左
                        drawPath(canvasCtx, pts, [362, 385, 387, 263, 373, 380]); // 右
                    } else if (activeMakeup.mode === '唇妝') {
                        drawPath(canvasCtx, pts, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291]);
                    }
                }
            }
            requestAnimationFrame(render);
        }

        function drawPath(ctx, pts, idxs) {
            ctx.beginPath();
            idxs.forEach((id, i) => {
                const x = pts[id].x * canvasElement.width;
                const y = pts[id].y * canvasElement.height;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fill();
        }

        window.selectCate = (cat) => {
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('active-cate'));
            document.getElementById(`btn-${cat}`).classList.add('active-cate');
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products[cat].map(p => `
                <div onclick="setActive('${cat}', '${p.color}', '${p.mix}', this)" class="product-item">
                    <div class="w-full h-8 rounded-lg mb-2 shadow-inner" style="background:${p.color}"></div>
                    <div class="text-[10px] font-bold text-stone-600">${p.name}</div>
                </div>
            `).join('');
        };

        window.setActive = (mode, color, mix, el) => {
            activeMakeup = { mode, color, mix };
            document.querySelectorAll('.product-item').forEach(i => i.classList.remove('active-prod'));
            el.classList.add('active-prod');
        };

        init();
    </script>
</body>
</html>
