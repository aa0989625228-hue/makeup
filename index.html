<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Beauty Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fafafa; touch-action: manipulation; }
        .video-container { 
            position: relative; width: 100%; max-width: 500px; aspect-ratio: 3/4; 
            margin: auto; border-radius: 2.5rem; overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.12); background: #000;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .tab-active { @apply bg-stone-800 text-white shadow-md; }
        .makeup-item { @apply flex flex-col items-center gap-2 cursor-pointer transition-transform active:scale-90; }
        .color-circle { @apply w-12 h-12 rounded-full border-4 border-white shadow-sm; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="boot" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-10 text-center">
        <div class="w-16 h-16 border-4 border-stone-200 border-t-stone-800 rounded-full animate-spin mb-6"></div>
        <h2 class="text-xl font-bold tracking-widest mb-2">AI BEAUTY LAB</h2>
        <p class="text-xs text-stone-400 mb-8">正在初始化 468 點 3D 渲染引擎...</p>
        <button onclick="startApp()" class="w-full max-w-xs bg-stone-800 text-white py-4 rounded-full font-bold">開始體驗</button>
    </div>

    <div class="max-w-md mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-lg font-black tracking-[0.3em] text-stone-800">AI BEAUTY LAB</h1>
        </header>

        <div class="video-container mb-8">
            <video id="webcam" playsinline muted></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="bg-white rounded-[2.5rem] p-6 shadow-xl border border-stone-50">
            <div class="flex p-1 bg-stone-100 rounded-full mb-8">
                <button onclick="tab('lip', this)" class="flex-1 py-3 rounded-full text-xs font-bold tab-active">唇彩</button>
                <button onclick="tab('eye', this)" class="flex-1 py-3 rounded-full text-xs font-bold text-stone-400">眼影</button>
                <button onclick="tab('face', this)" class="flex-1 py-3 rounded-full text-xs font-bold text-stone-400">底妝</button>
            </div>

            <div id="box-lip" class="grid grid-cols-4 gap-4 box-pane">
                <div onclick="apply('lip','#9f1239')" class="makeup-item"><div class="color-circle" style="background:#9f1239"></div><span class="text-[10px]">經典</span></div>
                <div onclick="apply('lip','#be185d')" class="makeup-item"><div class="color-circle" style="background:#be185d"></div><span class="text-[10px]">玫瑰</span></div>
                <div onclick="apply('lip','#fb923c')" class="makeup-item"><div class="color-circle" style="background:#fb923c"></div><span class="text-[10px]">晨曦</span></div>
            </div>

            <div id="box-eye" class="hidden grid grid-cols-4 gap-4 box-pane">
                <div onclick="apply('eye','#451a03')" class="makeup-item"><div class="color-circle" style="background:#451a03"></div><span class="text-[10px]">大地</span></div>
                <div onclick="apply('eye','#f43f5e')" class="makeup-item"><div class="color-circle" style="background:#f43f5e"></div><span class="text-[10px]">甜心</span></div>
            </div>

            <div id="box-face" class="hidden grid grid-cols-4 gap-4 box-pane">
                <div onclick="apply('face','#fff1e6')" class="makeup-item"><div class="color-circle" style="background:#fff1e6"></div><span class="text-[10px]">象牙</span></div>
                <div onclick="apply('face','#fce8d5')" class="makeup-item"><div class="color-circle" style="background:#fce8d5"></div><span class="text-[10px]">自然</span></div>
            </div>

            <button onclick="location.reload()" class="w-full mt-10 text-[10px] text-stone-300 tracking-tighter uppercase">Reset All Effects</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        let config = { lip: null, eye: null, face: null };

        async function startApp() {
            document.getElementById('boot').style.display = 'none';
            const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
            
            faceMesh.onResults(draw);
            new Camera(video, { onFrame: async () => await faceMesh.send({image: video}), width: 480, height: 640 }).start();
        }

        function draw(res) {
            canvas.width = video.clientWidth;
            canvas.height = video.clientHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (res.multiFaceLandmarks && res.multiFaceLandmarks[0]) {
                const p = res.multiFaceLandmarks[0];

                // 💡 底妝優化：鏤空遮罩，不擋眼鏡與眼睛
                if (config.face) {
                    ctx.save();
                    ctx.beginPath();
                    // 外圈：全臉
                    const faceIdx = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];
                    faceIdx.forEach((id, i) => {
                        const pt = p[id];
                        i === 0 ? ctx.moveTo(pt.x * canvas.width, pt.y * canvas.height) : ctx.lineTo(pt.x * canvas.width, pt.y * canvas.height);
                    });

                    // 內圈：挖掉眼鏡區域（左眼+右眼廣域區域）
                    const cutOut = [33, 133, 153, 145, 362, 263, 374, 380];
                    ctx.moveTo(p[33].x * canvas.width, p[33].y * canvas.height);
                    cutOut.forEach(id => ctx.lineTo(p[id].x * canvas.width, p[id].y * canvas.height));
                    
                    ctx.fillStyle = config.face;
                    ctx.globalAlpha = 0.25;
                    ctx.globalCompositeOperation = "soft-light";
                    ctx.filter = "blur(15px)"; // 強力羽化邊緣，消除面具感
                    ctx.fill();
                    ctx.restore();
                }

                // 唇妝與眼影保持高精度鎖定
                if (config.lip) paint(ctx, p, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291], config.lip, 0.4, "multiply", 2);
                if (config.eye) {
                    paint(ctx, p, [223, 224, 225, 226, 230, 231, 232], config.eye, 0.2, "multiply", 6);
                    paint(ctx, p, [443, 444, 445, 446, 450, 451, 452], config.eye, 0.2, "multiply", 6);
                }
            }
        }

        function paint(ctx, p, ids, color, alpha, mode, blur) {
            ctx.save();
            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.globalCompositeOperation = mode;
            ctx.filter = `blur(${blur}px)`;
            ids.forEach((id, i) => {
                const pt = p[id];
                i === 0 ? ctx.moveTo(pt.x * canvas.width, pt.y * canvas.height) : ctx.lineTo(pt.x * canvas.width, pt.y * canvas.height);
            });
            ctx.fill();
            ctx.restore();
        }

        window.tab = (t, b) => {
            document.querySelectorAll('.tab-active').forEach(el => el.classList.remove('tab-active', 'bg-stone-800', 'text-white'));
            b.classList.add('tab-active', 'bg-stone-800', 'text-white');
            document.querySelectorAll('.box-pane').forEach(el => el.classList.add('hidden'));
            document.getElementById(`box-${t}`).classList.remove('hidden');
        };

        window.apply = (t, c) => { config[t] = c; };
    </script>
</body>
</html>
