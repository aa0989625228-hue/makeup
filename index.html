<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 虛擬試妝 - heme 質感系列</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 基礎樣式保持不變 */
        .camera-box { background: #000; border-radius: 15px; position: relative; overflow: hidden; border: 4px solid #f3f4f6; transition: all 0.3s; }
        .hidden { display: none; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: all 0.3s ease; }
        
        .color-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0; transition: all 0.4s ease;
            mix-blend-mode: soft-light;
        }

        /* ✨ 模式濾鏡設定：參考 heme 質感調色 */
        /* 底妝：絲絨霧面感 */
        .foundation-mode #webcam { filter: scaleX(-1) brightness(1.1) contrast(0.95) saturate(0.9) blur(1px); }
        
        /* 眼妝：焦糖棕/乾燥玫瑰 (預設) */
        .eyemakeup-mode #webcam { filter: scaleX(-1) sepia(0.6) contrast(1.2) brightness(0.85); }
        .eyemakeup-mode .color-overlay { opacity: 0.6; background: linear-gradient(to bottom, rgba(139, 69, 19, 0.4), transparent); }

        /* 唇妝：經典紅/柔霧色 (預設) */
        .lipstick-mode #webcam { filter: scaleX(-1) saturate(3) brightness(0.8); }
        .lipstick-mode .color-overlay { opacity: 0.5; background: radial-gradient(circle, rgba(153, 27, 27, 0.6) 0%, transparent 75%); }

        .active-btn { @apply bg-stone-700 text-white font-bold scale-105 shadow-lg; }
        .product-card { @apply border p-2 rounded-lg text-center cursor-pointer hover:border-stone-500 transition bg-white; }
        .product-active { @apply border-stone-800 bg-stone-50 ring-2 ring-stone-200; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen font-sans text-stone-800">

    <nav class="bg-white shadow-sm p-4 text-center border-b border-stone-200">
        <h1 class="text-xl font-bold tracking-widest text-stone-700 underline decoration-stone-300">AI VIRTUAL MAKEUP x heme STYLE</h1>
    </nav>

    <main class="max-w-5xl mx-auto mt-6 p-4">
        
        <div id="step-start" class="text-center py-20">
            <div class="mb-8 inline-block p-4 border border-stone-300">
                <h2 class="text-2xl font-light tracking-widest uppercase">Experience High-End Texture</h2>
            </div>
            <br>
            <button onclick="requestCamera()" class="bg-stone-800 hover:bg-black text-white px-12 py-4 rounded-none transition shadow-xl text-lg font-bold tracking-widest">
                START TRY-ON
            </button>
        </div>

        <div id="step-main" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-5 shadow-sm border border-stone-200">
                    <h3 class="font-bold border-b border-stone-100 pb-2 mb-4 uppercase tracking-tighter">Category / 類別</h3>
                    <div class="flex flex-col space-y-2">
                        <button id="btn-foundation" onclick="selectCategory('底妝')" class="text-left p-3 border border-stone-100 rounded hover:bg-stone-50 transition">✨ 絲絨底妝</button>
                        <button id="btn-eyemakeup" onclick="selectCategory('眼妝')" class="text-left p-3 border border-stone-100 rounded hover:bg-stone-50 transition">👁️ 六色眼影盤</button>
                        <button id="btn-lipstick" onclick="selectCategory('唇妝')" class="text-left p-3 border border-stone-100 rounded hover:bg-stone-50 transition">💄 經典唇膏</button>
                    </div>
                </div>

                <div id="product-list" class="bg-white p-5 shadow-sm border border-stone-200 min-h-[300px]">
                    <h3 class="font-bold border-b border-stone-100 pb-2 mb-4 uppercase tracking-tighter">Select Shades / 色號選擇</h3>
                    <div id="product-items" class="grid grid-cols-2 gap-3">
                        <p class="col-span-2 text-stone-400 text-sm italic">請先選擇上方類別...</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="camera-container" class="camera-box aspect-video flex items-center justify-center shadow-xl">
                    <video id="webcam" autoplay playsinline></video>
                    <div id="overlay" class="color-overlay"></div>
                    <span id="camera-loading" class="absolute text-stone-400 animate-pulse">Initializing AI...</span>
                </div>
                <div class="mt-6 flex justify-between items-center bg-white p-4 border border-stone-200">
                    <div class="text-sm font-light text-stone-500">當前效果：<span id="current-label" class="font-bold text-stone-800">無</span></div>
                    <div class="flex gap-4">
                        <button onclick="location.reload()" class="text-stone-400 hover:text-stone-800 text-sm">重設</button>
                        <button onclick="goToCompare()" class="bg-stone-800 text-white px-10 py-3 font-bold shadow-lg hover:bg-black transition">
                            COMPARE 差異對比
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="step-compare" class="hidden bg-white p-8 border border-stone-200 shadow-2xl text-center">
            <h2 class="text-xl font-light mb-10 tracking-[0.2em] uppercase">Visual Comparison</h2>
            <div class="flex flex-col md:flex-row justify-center gap-10 mb-10">
                <div class="flex-1">
                    <p class="text-xs font-bold text-stone-400 mb-4 tracking-widest uppercase">Before</p>
                    <canvas id="canvas-before" class="w-full rounded-sm grayscale-[20%] shadow-lg" width="640" height="480"></canvas>
                </div>
                <div class="flex-1">
                    <p class="text-xs font-bold text-stone-600 mb-4 tracking-widest uppercase italic underline">After with heme</p>
                    <canvas id="canvas-after" class="w-full rounded-sm border border-stone-100 shadow-2xl" width="640" height="480"></canvas>
                </div>
            </div>
            <button onclick="resetTryOn()" class="bg-stone-200 text-stone-700 px-12 py-3 font-bold hover:bg-stone-300">← BACK</button>
        </div>
    </main>

    <script>
        let stream = null;
        let currentMode = '';
        let currentFilter = { overlay: '', filter: '' };

        // 模擬 heme 的產品資料庫
        const products = {
            '底妝': [
                { name: '01 Ivory', color: '#fdf5e6', filter: 'brightness(1.15) contrast(0.9) blur(1px)' },
                { name: '02 Beige', color: '#f5deb3', filter: 'brightness(1.05) contrast(0.95) saturate(1.1) blur(1px)' }
            ],
            '眼妝': [
                { name: '焦糖可可', color: '#8b4513', overlay: 'rgba(139, 69, 19, 0.4)', filter: 'sepia(0.8) contrast(1.3) brightness(0.8)' },
                { name: '乾燥玫瑰', color: '#bc8f8f', overlay: 'rgba(188, 143, 143, 0.4)', filter: 'sepia(0.3) hue-rotate(-20deg) saturate(1.8)' },
                { name: '暖粉棕', color: '#db7093', overlay: 'rgba(219, 112, 147, 0.3)', filter: 'hue-rotate(-10deg) saturate(2)' }
            ],
            '唇妝': [
                { name: '經典紅', color: '#991b1b', overlay: 'rgba(153, 27, 27, 0.4)', filter: 'saturate(3.5) brightness(0.8)' },
                { name: '珊瑚橘', color: '#ea580c', overlay: 'rgba(234, 88, 12, 0.3)', filter: 'hue-rotate(20deg) saturate(3)' },
                { name: '焦糖拿鐵', color: '#78350f', overlay: 'rgba(120, 53, 15, 0.5)', filter: 'sepia(0.9) brightness(0.7)' }
            ]
        };

        async function requestCamera() {
            const video = document.getElementById('webcam');
            document.getElementById('step-start').classList.add('hidden');
            document.getElementById('step-main').classList.remove('hidden');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                document.getElementById('camera-loading').classList.add('hidden');
            } catch (err) { alert("無法開啟鏡頭，請確認 HTTPS 與權限！"); }
        }

        function selectCategory(cat) {
            currentMode = cat;
            const container = document.getElementById('camera-container');
            container.className = 'camera-box aspect-video flex items-center justify-center shadow-xl';
            
            // UI 更新
            document.querySelectorAll('button[id^="btn-"]').forEach(btn => btn.classList.remove('active-btn'));
            const btnMap = {'底妝': 'btn-foundation', '眼妝': 'btn-eyemakeup', '唇妝': 'btn-lipstick'};
            document.getElementById(btnMap[cat]).classList.add('active-btn');

            // 生成產品選項
            const items = document.getElementById('product-items');
            items.innerHTML = '';
            products[cat].forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-card';
                div.innerHTML = `<div class="w-full h-8 mb-1 rounded" style="background:${p.color}"></div><span class="text-[10px]">${p.name}</span>`;
                div.onclick = () => applyProduct(p);
                items.appendChild(div);
            });
        }

        function applyProduct(product) {
            const video = document.getElementById('webcam');
            const overlay = document.getElementById('overlay');
            const label = document.getElementById('current-label');

            // 紀錄當前濾鏡參數給 Canvas 使用
            currentFilter.filter = product.filter;
            currentFilter.overlay = product.overlay || '';

            // 直接應用 CSS
            video.style.filter = `scaleX(-1) ${product.filter}`;
            overlay.style.opacity = product.overlay ? '1' : '0';
            overlay.style.background = product.overlay || 'transparent';
            label.innerText = product.name;

            // 觸發邊框閃爍提示已套用
            const container = document.getElementById('camera-container');
            container.style.borderColor = product.color;
            setTimeout(() => { container.style.borderColor = '#f3f4f6'; }, 500);
        }

        function goToCompare() {
            document.getElementById('step-main').classList.add('hidden');
            document.getElementById('step-compare').classList.remove('hidden');
            const video = document.getElementById('webcam');
            const cB = document.getElementById('canvas-before'), ctxB = cB.getContext('2d');
            const cA = document.getElementById('canvas-after'), ctxA = cA.getContext('2d');

            ctxB.save(); ctxB.scale(-1, 1); ctxB.drawImage(video, -640, 0, 640, 480); ctxB.restore();
            
            ctxA.save(); ctxA.scale(-1, 1);
            if (currentFilter.filter) ctxA.filter = currentFilter.filter;
            ctxA.drawImage(video, -640, 0, 640, 480);
            
            if (currentFilter.overlay) {
                ctxA.globalCompositeOperation = 'soft-light';
                ctxA.fillStyle = currentFilter.overlay;
                ctxA.fillRect(-640, 0, 640, 480);
            }
            ctxA.restore();
        }

        function resetTryOn() {
            document.getElementById('step-compare').classList.add('hidden');
            document.getElementById('step-main').classList.remove('hidden');
        }
    </script>
</body>
</html>
