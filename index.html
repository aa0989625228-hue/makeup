<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>HEME AI Pro 專業試妝系統</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container { position: relative; width: 640px; margin: auto; border-radius: 30px; overflow: hidden; background: #000; border: 8px solid #fff; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
        #webcam { width: 100%; height: auto; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .color-dot { width: 44px; height: 44px; border-radius: 50%; border: 3px solid white; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .active-dot { border-color: #292524 !important; transform: scale(1.15); }
        .makeup-pane { display: none; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .active-pane { display: grid !important; }
        #start-mask { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-[#fcfaf8] p-10">

    <div id="start-mask">
        <div class="text-center p-12 bg-white rounded-[3rem] shadow-2xl max-w-md border">
            <h2 class="text-2xl font-black mb-4">HEME 專業環境檢查</h2>
            <p class="text-stone-500 text-sm mb-10">請確保光源充足，避免背光。<br>底妝與唇彩已進行顯色強化。</p>
            <button onclick="startApp()" class="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold">開始體驗</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="grid lg:grid-cols-12 gap-12">
            <div class="lg:col-span-7">
                <div class="video-container">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border min-h-[580px]">
                    <div class="flex gap-3 mb-12 justify-center">
                        <button onclick="showTab('lip', this)" class="px-8 py-3 rounded-full text-xs font-black border-2 bg-stone-900 text-white tab-btn">唇彩</button>
                        <button onclick="showTab('eye', this)" class="px-8 py-3 rounded-full text-xs font-black border-2 text-stone-400 border-stone-100 tab-btn">眼影</button>
                        <button onclick="showTab('face', this)" class="px-8 py-3 rounded-full text-xs font-black border-2 text-stone-400 border-stone-100 tab-btn">底妝</button>
                    </div>

                    <div id="pane-lip" class="makeup-pane active-pane">
                        <div class="flex flex-col items-center gap-3"><div onclick="setMakeup('lip','#991b1b',this)" class="color-dot" style="background:#991b1b"></div><span class="text-[10px] font-bold text-stone-600">經典紅</span></div>
                        <div class="flex flex-col items-center gap-3"><div onclick="setMakeup('lip','#d9a7a7',this)" class="color-dot" style="background:#d9a7a7"></div><span class="text-[10px] font-bold text-stone-600 uppercase">肉桂粉(強)</span></div>
                        <div class="flex flex-col items-center gap-3"><div onclick="setMakeup('lip','#c2410c',this)" class="color-dot" style="background:#c2410c"></div><span class="text-[10px] font-bold text-stone-600">晨曦橘</span></div>
                    </div>

                    <div id="pane-eye" class="makeup-pane">
                        <div class="flex flex-col items-center gap-3"><div onclick="setMakeup('eye','#451a03',this)" class="color-dot" style="background:#451a03"></div><span class="text-[10px] font-bold text-stone-600">大地棕</span></div>
                        <div class="flex flex-col items-center gap-3"><div onclick="setMakeup('eye','#d97706',this)" class="color-dot" style="background:#d97706"></div><span class="text-[10px] font-bold text-stone-600">香檳金</span></div>
                    </div>

                    <div id="pane-face" class="makeup-pane">
                        <div class="flex flex-col items-center gap-3"><div onclick="setMakeup('face','#fef3c7',this)" class="color-dot" style="background:#fef3c7"></div><span class="text-[10px] font-bold text-stone-600">象牙白</span></div>
                        <div class="flex flex-col items-center gap-3"><div onclick="setMakeup('face','#fde68a',this)" class="color-dot" style="background:#fde68a"></div><span class="text-[10px] font-bold text-stone-600">自然色</span></div>
                        <div class="flex flex-col items-center gap-3"><div onclick="setMakeup('face','#fcd34d',this)" class="color-dot" style="background:#fcd34d"></div><span class="text-[10px] font-bold text-stone-600">小麥色</span></div>
                    </div>

                    <div class="mt-20 pt-8 border-t"><button onclick="resetAll()" class="text-xs font-bold text-stone-300">RESET</button></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        let current = { lip: null, eye: null, face: null };

        async function startApp() {
            document.getElementById('start-mask').remove();
            const URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights/';
            await faceapi.nets.tinyFaceDetector.loadFromUri(URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(URL);
            const s = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = s;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                loop();
            };
        }

        async function loop() {
            const res = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 128 })).withFaceLandmarks();
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (res) {
                const r = faceapi.resizeResults(res, { width: canvas.width, height: canvas.height });
                const pts = r.landmarks;

                // 1. 底妝：改用 "source-over" 加上透明度，確保顏色「蓋得上去」且不形成三角形
                if (current.face) {
                    ctx.save();
                    ctx.globalCompositeOperation = "source-over";
                    ctx.filter = "blur(20px)"; // 增加模糊度讓它像粉底液推開
                    const jaw = pts.getJawOutline();
                    // 只取下顎線的一部分，避免連回脖子產生三角形
                    drawPath(ctx, jaw.slice(0, 17), current.face, 0.2, false); 
                    ctx.restore();
                }

                // 2. 眼影：面積向上擴展 15px (單眼皮必備)
                if (current.eye) {
                    ctx.save();
                    ctx.globalCompositeOperation = "multiply";
                    ctx.filter = "blur(10px)";
                    const lEye = pts.getLeftEye();
                    const rEye = pts.getRightEye();
                    // 向上偏移繪製眼窩
                    drawPath(ctx, lEye.map(p => ({x: p.x, y: p.y-15})), current.eye, 0.4, true);
                    drawPath(ctx, rEye.map(p => ({x: p.x, y: p.y-15})), current.eye, 0.4, true);
                    ctx.restore();
                }

                // 3. 唇彩：強制使用 color 模式疊加，淺色也能極度鮮豔
                if (current.lip) {
                    ctx.save();
                    ctx.globalCompositeOperation = "multiply"; // 使用相乘模式增加飽和度
                    const m = pts.getMouth();
                    drawPath(ctx, m.slice(0, 7), current.lip, 0.6, true);
                    drawPath(ctx, [m[6], m[7], m[8], m[9], m[10], m[11], m[0]], current.lip, 0.6, true);
                    ctx.restore();
                }
            }
            requestAnimationFrame(loop);
        }

        function drawPath(ctx, p, color, alpha, close) {
            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            p.forEach((v, i) => i === 0 ? ctx.moveTo(v.x, v.y) : ctx.lineTo(v.x, v.y));
            if (close) ctx.closePath();
            ctx.fill();
        }

        window.showTab = (t, b) => {
            document.querySelectorAll('.makeup-pane').forEach(p => p.classList.remove('active-pane'));
            document.getElementById('pane-' + t).classList.add('active-pane');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "px-8 py-3 rounded-full text-xs font-black border-2 text-stone-400 border-stone-100 tab-btn";
            });
            b.className = "px-8 py-3 rounded-full text-xs font-black border-2 bg-stone-900 text-white tab-btn";
        };

        window.setMakeup = (t, c, e) => {
            current[t] = c;
            e.closest('.makeup-pane').querySelectorAll('.color-dot').forEach(d => d.classList.remove('active-dot'));
            e.classList.add('active-dot');
        };

        window.resetAll = () => {
            current = { lip: null, eye: null, face: null };
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active-dot'));
        };
    </script>
</body>
</html>
