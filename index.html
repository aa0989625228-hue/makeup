<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heme AI Beauty Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fcfcfc; font-family: sans-serif; overflow: hidden; }
        .video-container { 
            position: relative; width: 100%; max-width: 400px; aspect-ratio: 3/4; 
            margin: 10px auto; border-radius: 2rem; overflow: hidden; 
            background: #000; border: 4px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #webcam, #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; transform: scaleX(-1); 
        }
        /* 加大間距的選項樣式 */
        .color-item {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; padding: 12px; /* 增加內距讓點擊範圍變大 */
            min-width: 80px;
        }
        .color-circle {
            width: 52px; height: 52px; border-radius: 50%;
            border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 8px; transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .color-item:active .color-circle { transform: scale(0.9); }
        .selected .color-circle { outline: 2px solid #292524; outline-offset: 3px; }
        .color-label { font-size: 12px; font-weight: bold; color: #78716c; }
        
        /* 卸妝按鈕特殊樣式 */
        .reset-icon { font-size: 20px; color: #a8a29e; }

        #gate { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .makeup-panel { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 15px; /* 加大元件之間的間距 */
            margin-top: 25px; 
        }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

    <div id="gate">
        <div class="max-w-md w-full p-8 text-center">
            <h2 class="text-2xl font-black mb-8 text-stone-900">歡迎體驗 HEME AI 試妝</h2>
            <div class="bg-stone-50 p-6 rounded-[2rem] text-left mb-10 border border-stone-100 shadow-sm">
                <p class="text-sm font-bold mb-4 text-stone-800">為了確保「自然服貼」效果，請注意：</p>
                <div class="space-y-3 text-xs text-stone-500">
                    <p>1. 💡 正確燈光：請面向光源，確保光線充足。</p>
                    <p>2. 🚫 避免陰影：背光會影響 AI 對質感的判斷。</p>
                </div>
            </div>
            <button onclick="bootSystem()" class="w-full bg-[#292524] text-white py-4 rounded-full font-bold shadow-lg active:scale-95 transition-transform">我準備好了</button>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="text-center mb-4">
            <h1 class="text-xs font-bold tracking-widest text-stone-300">HEME PRO V8 NATURAL</h1>
        </header>

        <div class="video-container">
            <video id="webcam" playsinline autoplay muted></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm mt-4">
            <div class="flex p-1 bg-stone-100 rounded-full">
                <button onclick="switchTab('lip', this)" class="flex-1 py-2 text-sm font-bold rounded-full bg-white shadow-sm text-stone-900">唇部</button>
                <button onclick="switchTab('eye', this)" class="flex-1 py-2 text-sm font-bold rounded-full text-stone-400">眼部</button>
                <button onclick="switchTab('face', this)" class="flex-1 py-2 text-sm font-bold rounded-full text-stone-400">底妝</button>
            </div>

            <div id="tab-lip" class="makeup-panel">
                <div onclick="applyMakeup('lip','#B03030',this)" class="color-item">
                    <div class="color-circle" style="background-color: #B03030;"></div>
                    <span class="color-label">經典紅</span>
                </div>
                <div onclick="applyMakeup('lip','#D67B7B',this)" class="color-item">
                    <div class="color-circle" style="background-color: #D67B7B;"></div>
                    <span class="color-label">玫瑰金</span>
                </div>
                <div onclick="applyMakeup('lip','#9E5B4F',this)" class="color-item">
                    <div class="color-circle" style="background-color: #9E5B4F;"></div>
                    <span class="color-label">暖茶棕</span>
                </div>
                <div onclick="applyMakeup('lip', null, this)" class="color-item">
                    <div class="color-circle" style="background-color: #f5f5f4;">
                        <span class="reset-icon">✕</span>
                    </div>
                    <span class="color-label">解除</span>
                </div>
            </div>

            <div id="tab-eye" class="makeup-panel hidden">
                <div onclick="applyMakeup('eye','#63403A',this)" class="color-item">
                    <div class="color-circle" style="background-color: #63403A;"></div>
                    <span class="color-label">大地棕</span>
                </div>
                <div onclick="applyMakeup('eye','#C5A059',this)" class="color-item">
                    <div class="color-circle" style="background-color: #C5A059;"></div>
                    <span class="color-label">香檳金</span>
                </div>
                <div onclick="applyMakeup('eye', null, this)" class="color-item">
                    <div class="color-circle" style="background-color: #f5f5f4;">
                        <span class="reset-icon">✕</span>
                    </div>
                    <span class="color-label">解除</span>
                </div>
            </div>

            <div id="tab-face" class="makeup-panel hidden">
                <div onclick="applyMakeup('face','#F3E0D0',this)" class="color-item">
                    <div class="color-circle" style="background-color: #F3E0D0;"></div>
                    <span class="color-label">象牙色</span>
                </div>
                <div onclick="applyMakeup('face','#E8D0BB',this)" class="color-item">
                    <div class="color-circle" style="background-color: #E8D0BB;"></div>
                    <span class="color-label">自然色</span>
                </div>
                <div onclick="applyMakeup('face', null, this)" class="color-item">
                    <div class="color-circle" style="background-color: #f5f5f4;">
                        <span class="reset-icon">✕</span>
                    </div>
                    <span class="color-label">解除</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        let currentMakeup = { lip: null, eye: null, face: null };
        let faceMesh;

        async function bootSystem() {
            document.getElementById('gate').style.display = 'none';
            faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
            faceMesh.onResults(onResults);

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                video.play();
                requestAnimationFrame(process);
            };
        }

        async function process() {
            if (!video.paused) await faceMesh.send({image: video});
            requestAnimationFrame(process);
        }

        function onResults(results) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
                const pts = results.multiFaceLandmarks[0];
                if (currentMakeup.face) drawPart(pts, [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109], currentMakeup.face, 0.2, "soft-light", 15);
                if (currentMakeup.lip) drawPart(pts, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291], currentMakeup.lip, 0.45, "multiply", 2);
                if (currentMakeup.eye) {
                    drawPart(pts, [223, 224, 225, 226, 230, 231, 232], currentMakeup.eye, 0.2, "multiply", 10);
                    drawPart(pts, [443, 444, 445, 446, 450, 451, 452], currentMakeup.eye, 0.2, "multiply", 10);
                }
            }
        }

        function drawPart(pts, idxs, color, alpha, blendMode, blurVal) {
            ctx.save(); ctx.beginPath(); ctx.fillStyle = color; ctx.globalAlpha = alpha; ctx.globalCompositeOperation = blendMode; ctx.filter = `blur(${blurVal}px)`;
            idxs.forEach((id, i) => {
                const p = pts[id];
                i === 0 ? ctx.moveTo(p.x * canvas.width, p.y * canvas.height) : ctx.lineTo(p.x * canvas.width, p.y * canvas.height);
            });
            ctx.fill(); ctx.restore();
        }

        window.switchTab = (tabId, btn) => {
            document.querySelectorAll('.makeup-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            const btns = btn.parentElement.querySelectorAll('button');
            btns.forEach(b => {
                b.classList.remove('bg-white', 'shadow-sm', 'text-stone-900');
                b.classList.add('text-stone-400');
            });
            btn.classList.add('bg-white', 'shadow-sm', 'text-stone-900');
            btn.classList.remove('text-stone-400');
        };

        window.applyMakeup = (part, color, el) => {
            currentMakeup[part] = color; // 如果 color 是 null，對應部位就會清除
            const items = el.parentElement.querySelectorAll('.color-item');
            items.forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        };
    </script>
</body>
</html>
