<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEME AI 全能試妝</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container { position: relative; width: 100%; max-width: 640px; margin: auto; border-radius: 20px; overflow: hidden; background: #000; }
        #webcam { width: 100%; height: auto; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .color-dot { @apply w-9 h-9 rounded-full border-2 border-transparent cursor-pointer transition-all hover:scale-110 active:scale-95 shadow-sm; }
        .tab-btn { @apply px-6 py-2 text-xs font-bold border border-stone-200 rounded-full transition-all text-stone-400; }
        .active-tab { @apply bg-stone-800 text-white border-stone-800 shadow-md; }
        .active-dot { @apply border-stone-800 ring-2 ring-stone-200 scale-110; }
    </style>
</head>
<body class="bg-[#fcfaf8] p-4 lg:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-2xl font-bold tracking-[0.4em] text-stone-800 uppercase">HEME VIRTUAL PRO</h1>
        </header>

        <div class="grid lg:grid-cols-12 gap-10">
            <div class="lg:col-span-7">
                <div class="video-container shadow-2xl">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>
                    <div id="status" class="absolute inset-0 flex items-center justify-center bg-white z-50">
                        <div class="text-center">
                            <div class="w-8 h-8 border-2 border-stone-200 border-t-stone-800 rounded-full animate-spin mx-auto mb-4"></div>
                            <p class="text-[10px] tracking-widest text-stone-400">正在同步 AI 特徵點...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-stone-50 min-h-[450px] flex flex-col">
                    <div class="flex gap-2 mb-8 justify-center">
                        <button onclick="switchTab('lip', this)" class="tab-btn active-tab">唇彩</button>
                        <button onclick="switchTab('eye', this)" class="tab-btn">眼影</button>
                        <button onclick="switchTab('face', this)" class="tab-btn">底妝</button>
                    </div>

                    <div id="color-selector" class="grid grid-cols-4 gap-6 content-start flex-grow">
                        </div>

                    <div class="mt-8 pt-6 border-t border-stone-50 flex justify-between items-center">
                        <button onclick="resetAll()" class="text-[11px] font-bold text-stone-300 hover:text-red-400 transition">RESET ALL</button>
                        <span class="text-[9px] text-stone-200 tracking-tighter">ENGINE: FACE-API TINY_68</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        
        // 核心資料結構：確保三種妝效可以共存
        let activeMakeup = {
            lip: { color: null, opacity: 0.45 },
            eye: { color: null, opacity: 0.25 },
            face: { color: null, opacity: 0.15 }
        };

        const palette = {
            lip: [
                { name: '絲絨紅', hex: '#991b1b' }, { name: '珊瑚橘', hex: '#c2410c' },
                { name: '裸土色', hex: '#78350f' }, { name: '乾燥花', hex: '#881337' },
                { name: '甜橙色', hex: '#ea580c' }, { name: '深葡萄', hex: '#4c0519' },
                { name: '軟糖粉', hex: '#db2777' }, { name: '豆沙色', hex: '#9d5b5b' }
            ],
            eye: [
                { name: '可可棕', hex: '#451a03' }, { name: '香檳金', hex: '#d97706' },
                { name: '微醺紫', hex: '#581c87' }, { name: '大地色', hex: '#713f12' }
            ],
            face: [
                { name: '象牙色', hex: '#fef3c7' }, { name: '自然膚', hex: '#fde68a' },
                { name: '暖沙色', hex: '#fcd34d' }
            ]
        };

        async function init() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights/';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, frameRate: { ideal: 60 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                status.remove();
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                switchTab('lip', document.querySelector('.tab-btn'));
                loop();
            };
        }

        async function loop() {
            // 優化延遲：inputSize 設為 128 是濾鏡級流暢度的秘訣
            const result = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 128 }))
                                        .withFaceLandmarks();

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (result) {
                const resized = faceapi.resizeResults(result, { width: canvas.width, height: canvas.height });
                const landmarks = resized.landmarks;

                // 渲染底妝 (最底層)
                if (activeMakeup.face.color) {
                    drawLayer(ctx, landmarks.getJawOutline(), activeMakeup.face);
                }
                // 渲染眼妝 (中層)
                if (activeMakeup.eye.color) {
                    drawLayer(ctx, landmarks.getLeftEye(), activeMakeup.eye);
                    drawLayer(ctx, landmarks.getRightEye(), activeMakeup.eye);
                }
                // 渲染唇妝 (最頂層)
                if (activeMakeup.lip.color) {
                    // 嘴唇座標包含內外圈，face-api 的 getMouth 包含 20 個點，能完美黏合
                    drawLayer(ctx, landmarks.getMouth(), activeMakeup.lip);
                }
            }
            requestAnimationFrame(loop);
        }

        function drawLayer(ctx, points, makeup) {
            ctx.save();
            ctx.beginPath();
            ctx.fillStyle = makeup.color;
            ctx.globalAlpha = makeup.opacity;
            ctx.globalCompositeOperation = "multiply"; // 讓顏色與皮膚紋理融合

            points.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        window.switchTab = (type, el) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            el.classList.add('active-tab');
            
            const container = document.getElementById('color-selector');
            container.innerHTML = palette[type].map(item => `
                <div class="flex flex-col items-center gap-2">
                    <div onclick="setMakeup('${type}', '${item.hex}', this)" 
                         class="color-dot ${activeMakeup[type].color === item.hex ? 'active-dot' : ''}" 
                         style="background: ${item.hex}"></div>
                    <span class="text-[9px] text-stone-400 font-bold">${item.name}</span>
                </div>
            `).join('');
        };

        window.setMakeup = (type, color, el) => {
            // 更新全局妝效物件
            activeMakeup[type].color = color;
            
            // 更新 UI 顯示狀態
            const siblings = el.closest('#color-selector').querySelectorAll('.color-dot');
            siblings.forEach(d => d.classList.remove('active-dot'));
            el.classList.add('active-dot');
        };

        window.resetAll = () => {
            activeMakeup.lip.color = null;
            activeMakeup.eye.color = null;
            activeMakeup.face.color = null;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active-dot'));
        };

        init();
    </script>
</body>
</html>
